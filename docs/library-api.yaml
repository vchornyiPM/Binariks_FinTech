      summary: Accept the request for withdrawal via bank
      description: >-
        Use this API to accept the request for withdrawal via bank.  <br>When the request is accepted money is withdrawn from the user account and bank transfer should be performed manually on the bank side or via integration with the bank (integration should be developed).  <br>When the request is accepted `requestStatus` is `processed`.  <br>It can be also `limited` if the limit specified in the user contract is exceeded. If status is `limited` bank transfer should not be performed until compliance decision.
