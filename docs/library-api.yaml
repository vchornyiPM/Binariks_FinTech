        - fraction
      type: object
      properties:
        id:
          minLength: 1
          type: string
          description: Currency ID
          example: "25d59a93-6865-47b7-9afd-076a216fba17"
        code:
          maxLength: 12
          minLength: 1
          type: string
          description: |
            It can be ISO-4217 Currency alphabetic code for real currencies or any code for other entities created as Currency in the system
          example: "USD"
        digitalCode:
          maxLength: 12
          minLength: 1
          type: string
          description: |
            It can be ISO-4217 Currency numeric code for real currencies or any numeric code for other entities created as Currency in the system
          example: "840"
        symbol:
          maxLength: 12
          minLength: 1
          type: string
          description: Currency symbol
          example: "$"
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: Currency name
          example: "US Dollar"
        description:
          maxLength: 255
          minLength: 1
          type: string
          description: Currency description
          example: "US Dollar"
        fraction:
          type: integer
          format: int32
          description: Currency fraction
          example: 100
          default: 100
        withdrawalLimit:
          minimum: 0.000000001
          type: number
          description: Withdrawal limit for a specific currency and specifies whether this limit must be checked during the withdrawal flow
          example: 1000
