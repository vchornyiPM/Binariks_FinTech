  /v1/exchange:
    post:
      tags:
        - Currency exchange
      summary: Perform currency exchange operation
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to perform currency exchange operation. <br>Pass source account number in <code>inCoinSerial</code>, destination account number in <code>outCoinSerial</code>, operation type sell or buy in <code>exchangeType</code>, and the amount to sell or to buy in <code>amount</code> in the request body. <br>Account number can be taken from the <code>serial</code> in the response of API <code>POST /coins/view</code>. <br><br>Type <code>sell</code> means that as a user I want to sell 100 EUR from my EUR account <code>inCoinSerial</code> and get the exchanged amount to my USD account <code>outCoinSerial</code>. <br>Request body example for this case: <br><code>{</code><br> <code>&nbsp;&nbsp;"inCoinSerial": "{{EUR account}}",</code><br> <code>&nbsp;&nbsp;"outCoinSerial": "{{USD account}}",</code><br> <code>&nbsp;&nbsp;"exchangeType": "sell",</code><br> <code>&nbsp;&nbsp;"amount": "100"</code><br> <code>}</code><br> <br><br>Type <code>buy</code> means that as a user I want to buy 99 USD to my USD account <code>outCoinSerial</code> and pay for that operation from my EUR account <code>inCoinSerial</code>. <br>Request body example for this case: <br><code>{</code><br> <code>&nbsp;&nbsp;"inCoinSerial": "{{EUR account}}",</code><br> <code>&nbsp;&nbsp;"outCoinSerial": "{{USD account}}",</code><br> <code>&nbsp;&nbsp;"exchangeType": "buy",</code><br> <code>&nbsp;&nbsp;"amount": "99"</code><br> <code>}</code><br> <br><br>For better understanding of this flow, imagine this logic from the perspective of the currency exchange office: you bring 100 EUR to sell or you come to buy 99 USD. <br>In both cases, the source currency is EUR, but the initial amount you tell and the type of operation are different.  <br>To provide balances consistency, the following accounting is implemented for exchange operation:  <div> <table>  <thead> <th>Transaction type</th> <th>From account</th> <th>To account</th> <th>Currency</th> <th>Amount</th> </thead> <tbody> <tr> <td>Transfer</td> <td>Source <code>client</code> account</td> <td>Transit <code>exchange_reserve</code> account</td> <td>Source currency</td> <td>Amount in source currency</td>        </tr> <tr> <td>Transfer</td> <td>Source <code>client</code> account</td> <td>Fee <code>regular_system_commission</code> account</td> <td>Source currency</td> <td>Fee amount in source currency</td>        </tr> <tr> <td>Transfer</td> <td>Transit <code>exchange_reserve</code> account</td> <td>Destination <code>client</code> account</td> <td>Destination currency</td> <td>Amount in destination currency</td>        </tr> </tbody> </table> </div> <br>As you can see from the accounting, to be able to perform exchange operation you need to have enough money at the <code>exchange_reserve</code> account in the destination currency.  <br><code>exchange reserve</code> account is created automatically when fee profile for exchange operation is created the first time.  <br>You can use API <code>POST /exchange/reserve-top-up/create-request</code> to create request to top-up this account. <br>In the response, you will receive a created process ID with all details. </div>
      operationId: executeExchange
      requestBody:
        description: Request to execute exchange transaction
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteExchangeReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessProcessCurrencyExchangeResp'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/exchange/calculator:
    post:
      tags:
        - Currency exchange
      summary: Calculate the exchange rate which will be applied to currency exchange operation
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to calculate the exchange rate which will be applied to a currency exchange operation. <br>Pass the source account number in <code>inCoinSerial</code>, the destination account number in <code>outCoinSerial</code>, the operation type <code>sell</code> or <code>buy</code> in <code>exchangeType</code>, and the amount to sell or to buy in <code>amount</code> in the request body. <br>Account number can be taken from the <code>serial</code> in the response of API <code>POST /coins/view</code>. <br>A detailed explanation of how the operation type works can be found in the description of API <code>POST /exchange</code>. <br>In the response, you will receive a rate which will be applied to the currency exchange operation and the resulting amounts.  </div>
