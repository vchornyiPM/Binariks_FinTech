        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to approve or decline reset identification request initiated by the business user. <br>After the request is approved, user will be able to update profile information and will have to upload all required documents. <br>If the request is declined, user won't be able to update profile information or upload documents. <br>Pass organization ID in `organizationId` and request ID in `requestId` in the request URL. <br>Request ID can be taken from `id` in the response of API `POST /profiles/view-reset-identification-requests` or `POST /v1/organizations/{organizationId}/identification-request`. <br>In the response, you will receive the request ID, updated status (APPROVED or DECLINED), and initiator details. <br>This endpoint replaces the deprecated endpoints: <li><code>POST /v1/profiles/{userId}/reset-identification-requests/{reqId}/approve</code></li> <li><code>POST /v1/profiles/{userId}/reset-identification-requests/{reqId}/decline</code></li> </div>
      operationId: updateResetIdentificationRequest
      parameters:
