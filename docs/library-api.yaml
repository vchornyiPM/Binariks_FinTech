        Use this API to view the available amount on the specified account for the specified organization by `organizationId` and `coinSerial`. The account balance consists of `amount` (total) of the balance and `availableAmount` (in cases when some funds are on hold). <br>Available for both the `system` and business (`individual` or `merchant`) organization types. Provide the ID of the organization in `organizationId` and the account number in `coinSerial` in the request URL parameter.  <br>Account number (`serial`) and `availableAmount` will return in the response. <br>To get the `organizationId` use GET /organizations request, which is obtaining a list of all available organizations in the system. You will receive `id` along with all details in the response. <br>To get the `coinSerial` use API GET /organizations/{id}/coins to obtain accounts for the specified organization by organization `id` (field `serial` in the response). Available for both `system` and business (`individual` or `merchant`) organization types.   <br>Also, API GET /coins/serial can be used to get account number for `client` type of accounts, and account numbers return in response (field `serial`).
