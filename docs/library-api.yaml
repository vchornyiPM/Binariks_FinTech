    CreatePaymentReq:
      title: CreatePaymentReq
      required:
        - description
        - currencyId
        - payer
        - pointOfSaleId
        - serial
      type: object
      properties:
        pointOfSaleId:
          type: string
          description: Internal ID of the point of sale. Can be taken from `id` in the API `GET /points-of-sale` or is returned in the API `POST /point-of-sale` for POS creation.
          example: "af855f64-dd09-421c-801a-d0d0c3f5090f"
        amount:
          type: number
          description: Payment amount. Required only for NO_PRODUCTS `productsPolicy`. For other policies must be null.
          example: 222
        currencyId:
          type: string
          description: Internal ID of the currency
          example: "b51d65c1-79cd-4e96-99f3-8db991194d76"
        description:
          maxLength: 255
          minLength: 1
          type: string
          description: Description of the merchant payment
          example: "My first merchant payment"
        orderId:
          maxLength: 255
          minLength: 0
          type: string
          description: ID of the merchant payment in the merchant system
          example: "externalId12345"
        latitudes:
          maximum: 90
          minimum: -90
          type: number
        longitudes:
          maximum: 180
          minimum: -180
          type: number
        payer:
          $ref: '#/components/schemas/PayerIdentifierDto'
        productsPolicy:
          type: string
          description: |
            Payment's policy for products.
            no_products means products must not be present within payment.
            accept_custom_prices means products and their price values (can differ from available) must be specified.
            disallow_custom_prices means products must be specified and if some price is not available, hen an error will be returned
          enum:
            - no_products
            - accept_custom_prices
            - disallow_custom_prices
          x-enum-varnames:
            - no_products
            - accept_custom_prices
            - disallow_custom_prices
          example: "no_products"
        purchases:
          maxItems: 2147483647
          minItems: 1
          type: array
          description: |
            List of purchases to be conducted.
            Must be null for no_products policy. For other policies is mandatory
          items:
            $ref: '#/components/schemas/MerchantPurchaseDto'
        urls:
          $ref: '#/components/schemas/PaymentUrlsDto'
        serial:
          type: string
          description: Unique account number to which payment should be received
      description: Request to create a new merchant payment
    PaymentInstrumentDto:
      title: PaymentInstrumentDto
      type: object
      properties:
        instrumentType:
          type: string
          description: 'Payment instrument. Describes how user pays: with his account or with cash. Defaults to ''coin'' if not specified.'
          enum:
            - coin
            - in_system_card
            - cash
            - payment_card
          x-enum-varnames:
            - coin
            - in_system_card
            - cash
            - payment_card
        value:
          type: string
          description: >-
            Optional field. Mandatory only if instrumentType is 'IN_SYSTEM_CARD' or 'PAYMENT_CARD'. For instrumentType='coin', this is the account number of the account from which to pay for the merchant payment. For instrumentType='in_system_card', this is the in-system card number. For instrumentType='cash', this field is not used. For instrumentType='payment_card', this is the Provider ID.
      description: Information about payment instrument
    MerchantPurchaseDto:
      title: MerchantPurchaseDto
      required:
        - measureUnit
        - product
        - quantity
      type: object
      properties:
        product:
          $ref: '#/components/schemas/IdOrExtCodeDto'
        measureUnit:
          $ref: '#/components/schemas/IdOrExtCodeDto'
        quantity:
          minimum: 1
          type: number
          description: Quantity of the product
        price:
          type: number
          description: |
            Custom prices of the product.
            Must be specified only for ACCEPT_CUSTOM_PRICES policy. Must be null for other policies.
      description: Information about products to be purchased
    PayerIdentifierDto:
      title: PayerIdentifierDto
      required:
        - method
        - value
      type: object
      properties:
        method:
          type: string
          description: Identification method. `none` means payer will be determined later
          enum:
            - none
            - phone
            - in_system_card
            - user_id
          x-enum-varnames:
            - none
            - phone
            - in_system_card
            - user_id
        value:
          maxLength: 1024
          minLength: 0
          type: string
          description: ID value (phone number, in-system card number,...)
        confirmation:
          type: string
          description: 'Confirmation method, otp_phone by default'
          enum:
            - none
            - otp_phone
            - master_pin
          x-enum-varnames:
            - none
            - otp_phone
            - master_pin
      description: Payer ID
    PaymentUrlsDto:
