components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageParameter:
      name: page
      in: query
      required: false
      schema:
        minimum: 0
        exclusiveMinimum: false
        default: 0
        type: integer
        format: int32
      description: Page number which should be returned
      example: 0
    SizeParameter:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        maximum: 20
        exclusiveMaximum: false
        minimum: 1
        exclusiveMinimum: false
        default: 10
      description: Number of records which will be returned on the page
      example: 10
  schemas:
    PageRequest:
      title: PageRequest
      type: object
      properties:
        pageNumber:
          minimum: 0
          exclusiveMinimum: false
          default: 0
          type: integer
          description: Page number which should be returned
          example: 0
          format: int32
        pageSize:
          maximum: 20
          exclusiveMaximum: false
          minimum: 1
          exclusiveMinimum: false
          default: 10
          type: integer
          description: Number of records which will be returned on the page
          example: 10
          format: int32
    ResponseEntityVoid:
      title: ResponseEntity
      type: object
    ProductsToDeleteResp:
      title: ProductsToDeleteResp
      allOf:
        - $ref: '#/components/schemas/ResponseEntityVoid'
        - type: object
          properties:
            message:
              type: string
              description: Requirements to delete Provider products
            productsToDelete:
              type: array
              description: Data to delete products
              items:
                $ref: '#/components/schemas/ProductToDeleteDto'
    ProductToDeleteDto:
      title: ProductToDeleteDto
      type: object
      properties:
        gateProductId:
          type: string
          description: Provider product ID
        contractId:
          type: string
          description: Contract ID
        gateCommissionProfileId:
          type: string
          description: Provider fee profile ID
      description: Data to delete product
    PageResponse:
      title: PageResponse
      type: object
      properties:
        pageNumber:
          type: integer
          description: Page number which is returned
          example: 0
          format: int32
        pageSize:
          type: integer
          description: Number of records returned on the page
          example: 10
          format: int32
        totalPages:
          type: integer
          description: Total number of pages
          example: 1
          format: int64
        totalRecords:
          type: integer
          description: Total number of records
          example: 10
          format: int64
      description: Pageable response
    StringBinaryData:
      title: StringBinaryData
      type: string
      format: binary
      description: String binary data
    FileMultipartFormDataRequest:
      title: FileMultipartFormDataRequest
      required:
        - file
      type: object
      properties:
        file:
          $ref: '#/components/schemas/StringBinaryData'
      description: File multipart form-data request
    FilesMultipartFormDataRequest:
      title: FilesMultipartFormDataRequest
      required:
        - files
      type: object
      properties:
        files:
          type: array
          description: files
          items:
            $ref: '#/components/schemas/StringBinaryData'
      description: Files multipart form-data request
    FileMultipartFormDataWithLocaleRequest:
      title: FileMultipartFormDataWithLocaleRequest
      required:
        - file
        - locale
      type: object
      properties:
        file:
          $ref: '#/components/schemas/StringBinaryData'
        locale:
          type: string
          description: Locale
          example: "en"
      description: File multipart form-data with locale request
    ParameterString:
      type: string
      description: Parameter string
      example: "e88f415e-028c-4805-b3bb-5a99ec00b7c0"
    ParameterStringWithConstrains:
      type: string
      maxLength: 36
      description: Parameter string with constrains
      example: "6e22dba-44c2-4761-b571-6b61f9b543f1"
    ParameterBool:
      type: boolean
      nullable: true
      description: Parameter boolean
      example: false
    ParameterBoolean:
      type: boolean
      default: false
      description: Parameter boolean
      example: false
    ParameterBooleanDefaultTrue:
      type: boolean
      default: true
      description: Parameter boolean
      example: true
    ParameterDate:
      type: string
      format: date
      description: Parameter date
    ParameterDateTime:
      type: string
      format: date-time
      description: Parameter date time
    ParameterInteger:
      type: integer
      format: int32
      description: Parameter integer
      example: 123456789
    ParameterLong:
      type: integer
      format: int64
      description: Parameter long
      example: 987654321098765432
    UpdateCartTemplateRegularParamReq:
      type: object
      properties:
        regular:
          type: boolean
    TransactionsExportIdResp:
      title: TransactionsExportIdResp
      type: object
      properties:
        id:
          type: string
          description: Export ID
    TransactionsExportInfoResp:
      title: TransactionsExportInfoResp
      type: object
      required:
        - exportStatus
        - fileId
      properties:
        exportStatus:
          type: string
          description: Export status
          enum:
            - complete
            - pending
            - not_found
          x-enum-varnames:
            - complete
            - pending
            - not_found
        fileId:
          type: string
          description: Export ID
    CoinDto:
      title: CoinDto
      required:
        - active
        - amount
        - availableAmount
        - creditLimit
        - futureAmount
        - currency
        - serial
        - type
        - organizationId
      type: object
      properties:
        id:
          type: string
          description: ID
        serial:
          type: string
          description: Unique account number
        name:
          type: string
          description: Name
        amount:
          type: number
          description: Total amount of funds
        availableAmount:
          type: number
          description: 'Amount available to use: total subtract held funds'
        futureAmount:
          type: number
          description: Amount of expected income
        heldAmount:
          type: number
          description: The amount that was held for transactions
        creditLimit:
          type: number
          description: Credit limit amount
        currency:
          $ref: '#/components/schemas/CurrencyShortDto'
        active:
          type: boolean
          description: Whether coin is active
        type:
          $ref: '#/components/schemas/CoinType'
        main:
          type: boolean
        accounting:
          type: boolean
        inSystemCards:
          type: array
          description: In-system cards
          items:
            $ref: '#/components/schemas/InSystemCardShortDto'
        deactivationDate:
          type: string
          format: date-time
          description: Date of deactivation
        deactivationReason:
          $ref: '#/components/schemas/DeactivationReason'
        deactivationDescription:
          type: string
          description: "Short description of the deactivation reason"
        organizationId:
          type: string
          description: Organization ID
        organizationName:
          type: string
          description: Organization name
        technical:
          type: boolean
          description: Is coin technical or not
        primaryDepositAddress:
          $ref: '#/components/schemas/CoinDepositAddressDto'
      description: Information about coin
    CoinShortInfoDto:
