        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/registration:
    post:
      tags:
        - User self-registration
      summary: User self-registration
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to provide users with the ability to register on the platform. <br>The user can specify either a phone number or an email address for registration. <br>The phone number should be provided without a <code>+</code> sign or additional symbols. If <code>+</code> is specified, it will be ignored. <br>An OTP to confirm registration will be sent to the specified email or phone. <br>The OTP is set to <code>1111</code> on the SDK.finance demo environment for testing purposes. <br>In the response, you will receive the action <code>SMS_SENT</code> or <code>EMAIL_SENT</code>, depending on whether a phone number or email was provided. <br>This API requires a <code>Captcha-Token</code> if captcha validation is enabled (<code>captcha.validation.enabled=true</code>). </div>
      operationId: createUserRegistrationRequest
      parameters:
        - name: Captcha-Token
          in: header
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: >-
            User's response token to the CAPTCHA challenge, which will be verified to confirm that the caller is a real person and to prevent replay attacks. <br>Required only if CAPTCHA is enabled (<code>captcha.validation.enabled=true</code>); otherwise, it is ignored.
      requestBody:
        description: Request for self-registration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationReq'
        required: true
      responses:
        '200':
          description: OK
          content:
