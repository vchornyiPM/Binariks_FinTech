  '/v1/commission-profile':
    post:
      tags:
        - Contract management - commission profiles
      summary: Create new fee profile in the specified contract
      security:
        - BearerAuth: []
      description: >-
        Use this API to create new fee profile in the specified contract.  <br>Pass the following mandatory parameters in the request body:  <li>`type` - type of fee profile. Can be `system` or `vendor`.  <br>`system` means that the defined fee is total fee applied to the operation with the specified transaction type.  <br>`vendor` means that the defined fee is fee of third-party provider for operation processing.  <br>This fee will be deducted from the total fee and accounted at a special account. The difference between total and provider fee is system profit.  <br>Fee profile with type `vendor` should be created for each external operation otherwise system returns error for operation creation. <br>To get more details about external operations check <b>External operations - provider management</b>. <li>`vendorId` - third-party provider ID for `vendor` type and system provider ID for `system` type.  <br>Provider ID can be taken from `id` in the response of API `GET /gate-providers`. <li>`firstCurrencyId` - internal currency ID. Currency ID can be taken from `id` in the response of API `GET /currencies`. <li>`flowId` - internal operation flow ID. Operation flow ID can be taken from `id` in the response of API `GET /operation-flows`. <br>Pass the following conditional and optional parameters in the request body:  <li>`contractId`, mandatory for `type`=`system` - internal contract ID for which the defined fee profile will be linked.  <br>Contract ID can be taken from `id` in the response of API `POST /contracts/view`. <li>`secondCurrencyId`, mandatory when creating fee profile for multi-currency operations - internal currency ID of the second currency taken part in the operation.  <br>Currency ID can be taken from `id` in the response of API `GET /currencies`. <li>`productId` - internal ID of product or service provided by the third-party. It can be specified for defining fee for external operation `PURCHASE`. <br>To get more details about products check <b>External operations - product management</b>. <br>Internal product ID can be taken from `id` in the response of API `POST /gate/products/view`. <li>`active` - define whether operation with the specified transaction type is allowed. Default value is `true`.  <br>In the response, you will receive the fee profile with all details.
      operationId: createCommissionProfile
      requestBody:
        description: Request to create a fee profile
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommissionProfileReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommissionProfileResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
