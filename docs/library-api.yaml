  '/v1/merchant-payments/{identifier}/calculate':
    post:
      tags:
        - Merchant Payment
      summary: Calculate fee for merchant payment
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to calculate the fee that will be deducted from the merchant when receiving a merchant payment. <br>The fee for merchant payment should be specified in the merchant contract. <br>The amount details will be received in the response. <br>Pass the merchant payment ID in <code>identifier</code> in the request URL. <br>The merchant payment ID can be taken from the <code>paymentIdentifier</code> field in the response of API <code>POST /merchant-payments</code> or from the response of API <code>POST /merchant-payments/view</code>. <br>The merchant payment can be paid either by account or by card. <br>The payment method should be specified in <code>paymentInstrument.instrumentType</code>: <ul> <li><code>PAYMENT_CARD</code> — to pay by card. The provider ID must be passed in <code>paymentInstrument.value</code>.</li> <li><code>COIN</code> — to pay by account. The account number must be passed in <code>paymentInstrument.value</code>.</li> </ul> <br>The provider ID can be taken from the <code>id</code> field in the response of API <code>GET /gate-providers</code>. </div>
      security:
        - BearerAuth: []
      operationId: calculateCommissionFeeForMerchantPayment
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Internal ID of Merchant Payment. `identifier` can be taken from `paymentIdentifier` in the response of the `POST /merchant-payments` response or is returned in the response on API `POST /merchant-payments/view`.
          example: 1562432894
      requestBody:
        description: A request to calculate the fee charged to a customer — Individual or Merchant — when executing a merchant payment.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantPaymentCommissionCalculationRequest'
        required: true
      responses:
