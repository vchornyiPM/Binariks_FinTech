    BankAccountDetailsDto:
      title: BankAccountDetailsDto
      required:
        - fullName
      type: object
      properties:
        fullName:
          maxLength: 255
          minLength: 1
          type: string
          description: Full name of the receiver
          example: 'Tom Harrison'
        bankAccountNumber:
          maxLength: 255
          minLength: 1
          type: string
          description: Bank account number
          example: '1234567890'
        iban:
          pattern: '[A-Z]{2}[0-9]{2}[a-zA-Z0-9]{1,30}'
          type: string
          description: International account number (IBAN)
          example: 'UA730577753473920323685820538'
        bicOrSwift:
          pattern: '[a-zA-Z]{4}[a-zA-Z]{2}[a-zA-Z0-9]{2}([a-zA-Z0-9]{3})?'
          type: string
          description: BIC or SWIFT
          example: 'PBANUA2XK2R'
    BankDetailsDto:
      title: BankDetailsDto
      type: object
      properties:
        bic:
          pattern: '[a-zA-Z]{4}[a-zA-Z]{2}[a-zA-Z0-9]{2}([a-zA-Z0-9]{3})?'
          type: string
          description: BIC
          example: 'PBANUA2XK2R'
        swift:
          maxLength: 255
          minLength: 0
          pattern: '[a-zA-Z]{4}[a-zA-Z]{2}[a-zA-Z0-9]{2}([a-zA-Z0-9]{3})?'
          type: string
          description: SWIFT
          example: 'PBANUA2XK2D'
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: Bank name
          example: 'Private Bank'
        address:
          maxLength: 255
          minLength: 1
          type: string
          description: Bank address
          example: 'Maidan Nezalezhnosti, 1'
        city:
          type: string
          description: City
          example: 'Kyiv'
        countryCode:
          type: string
          maxLength: 2
          minLength: 2
          description: Country code
          example: 'UA'
        zipCode:
          type: string
          description: Postal zip code
          example: '01001'
      description: Banking details
    IbanValidationReq:
      title: IbanValidationReq
      properties:
        iban:
          type: string
          description: IBAN
          example: 'UA730577753473920323685820538'
      description: IBAN validation request
    IbanValidationDto:
      title: IbanValidationDto
      type: object
      properties:
        ibanIsValid:
          type: boolean
          description: IBAN validation status
          example: true
      description: Iban validation data
    IbanDto:
      title: IbanDto
      type: object
      properties:
        iban:
          type: string
          description: IBAN
          example: 'UA730577753473920323685820538'
        countryCode:
          type: string
          maxLength: 2
          minLength: 2
          description: Country code
          example: 'UA'
        bankId:
          type: string
          maxLength: 36
          minLength: 36
          description: Bank ID
          example: '289efecd-464b-4fae-a5a7-2175321b5d8c'
      description: IBAN data
