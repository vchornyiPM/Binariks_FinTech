  /v1/merchant-payments:
    post:
      tags:
        - Merchant Payment
      summary: Create a payment as a Merchant business user
      description: >-
        Use this API to create a payment for the merchant goods and services to the merchant account (account type `client`). <br>Provide all payment details (such as `pointOfSaleId`, `amount`, `paymentInstrument`, etc.) and information about the ordered products (such as `description`, `orderId`, `productPolicy` etc.) in the request body. <br>Check parameter `productsPolicy` description if you are going to use <b>Merchant product catalog</b> for merchant payment creation.  <br>Section `paymentInstrument` contains the required payment data.  <br>Supported values types of `paymentInstrument`: `COIN`, `IN_SYSTEM_CARD`, `CASH`. <br>Depending on what is provided in `paymentInstrument` the following parameters should be provided: <li>`IN_SYSTEM_CARD` - `inSystemCardNumber` is required  <li>`COIN` - there is no payer data required, payer `coinSerial` will be taken from the user authorization while the API `POST /merchant-payments/{identifier}/execute` will be performed by the payer (**Individual** of **Merchant** business user) <li>`CASH` - there is no payer data required <br>API `POST /merchant-payments` only creates a merchant payment. Use the `identifier` of created payment from the response to manage it.  Business users with appropriate permission are allowed to view, delete or execute merchant payments.  <br>Use API `POST /merchant-payments/{identifier}/execute` to pay for payment.  `identifier` is the required URL parameter and can be taken from the `POST /merchant-payments` response or it is returned in the response API `POST /merchant-payments/view`.
      security:
        - BearerAuth: []
      operationId: createMerchantPayment
      requestBody:
        description: Request to create a new payment
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrUpdatePaymentResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
