  '/v1/saltedge/create-lead-and-session':
    post:
      tags:
        - Open Banking - Salt Edge integration
      summary: Get user consent to fetch account, holder, or transaction information
      security:
        - BearerAuth: []
      description: >-
        Use this API to get user consent to fetch account, holder, or transaction information.  <br>This API performs several subsequent operations to get user consent and to store all required parameters in the system for further usage:  <li>Create lead in Salt Edge for user, if it was not created yet, and store the received Salt Edge customer ID in the user profile. Status of the newly created lead is `pending`. <li>Create lead session in Salt Edge for Salt Edge customer ID. <br><br>In the response, you will receive the redirect URL and its expiration.  <br>By opening received URL, user will be able to choose the following consent parameters and to grant consent:  <li>Provider, which is the source of financial data, e.g. Bank. If you need to get consent for the definite provider,  it can be passed in the `providerCode` in the request body. <li>Consent type. If you need to get consent with definite type, it can be passed in the `consentScopes` in the request body. <li>Period of consent validity, if it is allowed to specify for chosen Provider. <br><br>When user confirms granting consent, Salt Edge creates connection between Customer and Provider,  and sends callback to the SDK.finance platform with connection and customer IDs.  <br>After receiving callback, SDK.finance performs the following to store the related information in the system for further usage: <li>Update lead status to `verified` if it is `pending`. <li>Retrieve connection information from Salt Edge for the received connection ID and check that linkage between customer ID and connection ID is correct.  In the connection information response, consent ID for this connection is also present.  <li>Retrieve consent data from Salt Edge for the received consent ID. <li>Calculate consent expiration date if it is not returned based on maximum consent days for provider, for which consent was granted.  <li>Update related consent information in the database for further usage.
      operationId: createOrGetExistingLeadAndEstablishConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
