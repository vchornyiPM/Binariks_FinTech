          type: string
          description: Account number
        isDefault:
          type: boolean
          description: "Shows that the bank account will use as default in operations within a related account. \nIf it's the first bank account this parameter would automatically be set as true.\n"
        usedForTopUp:
          type: boolean
          description: Shows that pool bank account should be used for top-up for all in-system accounts
