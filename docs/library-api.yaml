  /v1/reconciliation/files:
    post:
      tags:
        - Reconciliation - transactions reconciliation
      summary: Upload and parse reconciliation files
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to upload and parse reconciliation files.  <br>When this API is called, the process of file uploading and parsing is started, and the result can be checked by calling API <code>POST /reconciliation/files/view</code>. <br>File format should be <code>csv</code> and field names should be exactly as following: <li><b>transaction ID</b> - transaction ID to look for transaction in the system. <li><b>transaction date</b> - transaction date in the format <code>YYYY-MM-DD</code>. <li><b>transaction amount</b> - transaction amount. <li><b>transaction currency</b> - currency code in ISO 4217 format (for example, USD, EUR). <br>Reconciliation files can have the following statuses:      <li><code>UPLOAD_FAILED</code> - file was not uploaded.     <li><code>UPLOADED</code> - file is uploaded to the file storage. <li><code>PARSED</code> - file is parsed and all data from file is stored in the database.  <li><code>PARSING_ERROR</code> - error occurs during parsing and file cannot be parsed and no data can be stored in the database.  <li><code>PARTIALLY_PARSED</code> - some records are parsed and some records are not, for example if value in the file is longer than database accepts. <li><code>IN_PROGRESS</code> - parsing is in progress. <li><code>RECONCILED</code> - data from file were taken for the reconciliation . <li><code>EXCEPTION</code> - any other exception occurred during file uploading or parsing.
      operationId: reconciliationFilesUpload
      requestBody:
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/FilesMultipartFormDataRequest'
                - type: object
                  properties:
                    format:
                      type: string
                      description: reconciliation format
        required: true
      responses:
        '204':
          description: File uploaded successfully and parsing has been started
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
