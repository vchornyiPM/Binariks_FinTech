      description: >-
        Use this API to get a deposit address for the account by the provided account number. <br>When the client application requests a deposit address for a user account, the system checks whether the asset is Fireblocks-enabled. <br>If yes, the system checks whether a deposit address is already linked to the internal account. <br>If no deposit address is linked, the system determines the asset type and executes the deposit address generation flow using the corresponding existing use case. <br>If the currency does not support Fireblocks integration, an exception will be thrown. <br>Pass account number in the request URL. <br>Account number can be taken from the `serial` in the response of API `POST /coins/view`.
      operationId: getCoinDepositAddress
