    description: >-
      The SDK.finance platform has the following technical integrations of Salt Edge Partners API for Open Banking: <ul> <li>[Salt Edge Partners Account Information API](<https://docs.saltedge.com/partners/v1/#overview>)  to provide access to financial information for any company that does not need to get a PSD2 Account Information Service Provider license</li> <li>[Salt Edge Partners Payment Initiation API](<https://docs.saltedge.com/partners_payment_initiation/v1/#>)  to provide payment initiation ability for any company that does not need to get a PSD2 Payment Initiation Service Provider license</li> </ul> <br>To ensure security, no sensitive data is stored in the SDK.finance platform.  <br>Only technical information is stored to link SDK.finance customer entity to Salt Edge customer entity, and the related consent for the definite Salt Edge provider.  <br>Check APIs description to get more detailed flow explanation. <br>To start using this integration, [contact us](<https://sdk.finance/integrations/#form>).
