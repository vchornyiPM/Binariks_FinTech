          maxLength: 255
          example: "1BoatSLRHtKNngkdXEeobR76b53LETtpyT"
        status:
          $ref: '#/components/schemas/AddressStatus'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the address was created (OffsetDateTime).
          example: "2025-12-29T12:34:56+02:00"
        externalVaultAccountId:
          type: string
          description: Provider vault account ID that owns this address.
          maxLength: 100
          example: "123456789"
        externalAssetId:
          type: string
          description: Provider external currency ID (e.g., BTC, ETH_TEST3, USDT_ERC20).
          maxLength: 100
          example: "BTC"
