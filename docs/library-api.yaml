    UserDto:
      title: UserDto
      required:
        - active
        - frozen
        - banned
        - contact
        - createdAt
        - id
        - members
        - name
      type: object
      properties:
        id:
          type: string
          description: Internal user ID
          example: "cca1fe9b-4e08-450c-840a-49dcefd7b126"
        name:
          type: string
          description: >-
            User name. <br>For service users this is user name. <br>For business users this is full name from organization profile.
          example: "Tony Stark"
        userName:
          type: string
          description: User name
          example: "Tony Stark"
        createdAt:
          type: string
          description: Date when user has been registered
          format: date-time
          example: "2021-01-28T18:12:48.985Z"
        active:
          type: boolean
          description: Shows if user is active
          example: true
        activeReason:
          $ref: '#/components/schemas/UpdateUserReasonType'
        activeDescription:
          type: string
          description: User active update description.
        frozen:
          type: boolean
          description: Shows if user is frozen
          example: true
        frozenReason:
          $ref: '#/components/schemas/UpdateUserReasonType'
        frozenDescription:
          type: string
          description: User frozen update description.
        banned:
          type: boolean
          description: Shows if user is banned. User can be banned if wrong password is specified for login more than the defined number of times.
          example: false
        defaultUser:
          type: boolean
          description: Shows if user is default. True means that user was created at system initialization step, therefore user can not be deleted and deactivated.
          example: false
        underInvestigation:
          type: boolean
          description: Shows if user is currently under investigation.
          example: false
        banExpiryDate:
          type: string
          description: |
            If user was banned it will be unbanned automatically after the defined period. This parameter shows when user will be unbanned.
            <br>For not banned users this parameter is not returned.
          format: date-time
          example: "2025-01-01T07:15:50.555Z"
        contact:
          $ref: '#/components/schemas/ContactDto'
        credentials:
          $ref: '#/components/schemas/CredentialsDto'
        members:
          type: array
          description: User membership information
          items:
            $ref: '#/components/schemas/OrganizationMemberDto'
        cohort:
          type: string
          description: The lifetime of the user's profile in the system, from the day of profile creation to the current moment, in weeks
          example: "16W"
        profileStatus:
          $ref: '#/components/schemas/ProfileStatus'
        lastLogin:
          type: string
          description: Date when the user has been logged in last time
          format: date-time
          example: "2024-01-28T18:12:48.985Z"
        lastTransaction:
          type: string
          description: Date when the user conducted last transaction
          format: date-time
          example: "2024-07-17T14:44:44.444Z"
        timezone:
          type: string
          format: timezone
          description: Client's time zone offset from UTC in ISO 8601 format
          example: "+05:30"
        systemLanguage:
          $ref: '#/components/schemas/SystemLanguage'
        monthlyFee:
          $ref: '#/components/schemas/MonthlyFeeBillingCycle'
        securityData:
          $ref: '#/components/schemas/SecurityDto'
      description: Information about user
