  /v1/push/token/:
    post:
      summary: Register a push notification token
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> This endpoint is used by the mobile application to register the Expo Push Token that the device generates when it launches with Expo Push Notification enabled.  <br>Each device creates exactly one token, and the same token is reused on that device until Expo refreshes it.  <br>The platform stores this token and later uses it when sending push notifications through the Expo Push Notification service. <br> <b>How the token is generated</b><br> The token is created by the mobile app via the Expo Push Notification SDK (npm package expo-notifications) after the user grants notification permissions.  <br>Once the app receives the token from Expo, it must send it to the backend using this API. <br> <b>Integration requirements</b><br> Before using this endpoint, the Expo Push Notification integration must be fully enabled on the server.<br> To activate the integration, the following environment variables must be configured: <ul> <li><code>notifications.push.enabled: true</code> Enables push notifications.</li> <li><code>notifications.push.provider: expoPushSender</code> Enables Expo as the push notification provider.</li> <li><code>expo.notification.integration.baseUrl: ${EXPO_NOTIFICATION_BASE_URL:https://exp.host/--/api/v2/}</code> Configure base url for Expo integration.</li> <li><code>expo.notification.integration.authHeader</code> Authentication header used when calling Expo api.</li> <li><code>notifications.push-notification-timer.enabled: true</code> Enables the internal timer responsible for processing queued push notifications.</li> </ul> <b>Additional timer-related variables (optional but recommended for production):</b> <ul> <li><code>notifications.push-notification-timer.process-data.pause-after-send: 'PT15M'</code> Pause duration after sending each notification. Suggested value: 15 minutes.</li> <li><code>notifications.push-notification-timer.process-data.ttl: 'PT24H'</code> Defines message lifetime in the queue.</li> </ul> <br>Only after these variables are set and the integration is active will the system correctly process and deliver push notifications using the tokens registered through this API. </div>
      operationId: registerPushToken
      tags:
        - Push Tokens
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePushTokenRequest'
            example:
              token: "fcm-dkTmS8JLRliwalXYz90Br3:APA91bEkT0_VGlrPXbDs9CzKhNF78CxZetkQGvxDqY5XGVJ7oHJ-yQrD208DsJtYkFlRRpD3M_56Zi0hRKcP9kSfeYh5gLHqL_4nzPZT3jOCMW"
      responses:
        '204':
          description: Push token successfully registered
