      title: CloseCoinWithCoinTransfer
      description: Request object for closing an account and transferring the remaining balance to another account.
      allOf:
        - $ref: '#/components/schemas/CloseCoinWith'
        - type: object
          required:
            - transferType
          properties:
            transferToCoinSerial:
              type: string
              description: "Account number to which money will be transferred in case closed account has positive balance"
              example: "765058479177"
    CloseCoinWithIbanTransfer:
      title: CloseCoinWithIbanTransfer
      description: Request object for closing an account and transferring the remaining balance to a specified IBAN.
      allOf:
        - $ref: '#/components/schemas/CloseCoinWith'
        - type: object
          required:
            - transferType
            - iban
            - recipientFullName
          properties:
            iban:
              type: string
              example: "SK6807200002891987426351"
              description: International Bank Account Number (IBAN) where the remaining balance should be transferred.
            swift:
              maxLength: 11
              minLength: 8
              type: string
              description: Bank SWIFT code
              example: "GIBASKBX"
            recipientFullName:
              type: string
              description: Recipient full name
