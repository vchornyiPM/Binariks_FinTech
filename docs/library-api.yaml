        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to view reconciliation mismatches with filtering and pagination.  <br>In the response, you will receive list of reconciliation mismatches with the ID, type, status, and all other details.   <br>Mismatch type is returned in the <code>mismatchType</code> and can be one of the following:  <li><code>TRANSACTION_NOT_FOUND</code> - transaction is present in the file but is not found in the system for the specified period. <li><code>WRONG_AMOUNT</code> - transaction amount in the file is different from transaction amount in the system. <li><code>WRONG_CURRENCY</code> - currency code in the file is different from the currency in the system. <li><code>WRONG_DATE</code> - date from the file is different from the date in the system. <li><code>WRONG_TRANSACTION_STATUS</code> - transaction status in the system is not “Processed”. <br><br>Mismatch can have the following status:     <li><code>NOT_RESOLVED</code> - mismatch is created and not resolved. <li><code>RESOLVED</code> - mismatch is resolved.

