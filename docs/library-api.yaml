  - name: Reconciliation - Operational days management
    description: >-
      Setting up calendar with operational days is required only if you need system to store account balances for each operational day. <br>After initialization, system works in the zero operational day and balances for each day are not stored. <br>Operational day has the following parameters: <ul> <li>Internal ID</li> <li>Number (starting from zero)</li> <li>Begin date and time</li> <li>End date and time</li> <li>Status: <b>Closed</b> - Past operational day, <b>Open</b> - current operational day, <b>Future</b> - future operational day</li> </ul> <br>Zero calendar day after system initialization has status <b>Open</b>, Begin date and time as <b>1970-01-01 00:00:00</b>, and End date is not specified. <br>Zero calendar day parameters will be changed after calendar setup. <br>Operational day status is changed automatically when end date is reached: <ul> <li><b>Open</b> is changed to <b>Closed</b></li> <li><b>Future</b> is changed to <b>Open</b></li> </ul>
  - name: Reconciliation - balances reconciliation
    description: >-
      SDK.finance platform provides the ability to reconcile balances and transactions.  <br><b>Balances reconciliation</b> goal is to compare liquidity amount in the specified currency in the system with balance at the respective bank account.  <br>Liquidity amount refers to the amount of money in the system that should be equal to the sum of balances of all clients accounts and sum of fees that were applied without necessity to withdraw them from the system.  <br><br>Account balances are stored for each day only if the system calendar is set. Check <b>Reconciliation - Operational days management</b> for more details about calendar setup.    <br><br>The following balances reconciliation statuses are defined in the system:  <table> <thead> <tr> <th><b>Status</b></th> <th><b>Description</b></th> <th><b>Transition Status</b></th> </tr> </thead> <tbody> <tr> <td>Not started</td> <td>Reconciliation record was created according to the defined frequency, but reconciliation was not yet performed</td> <td>In progress</td> </tr> <tr> <td>In progress</td> <td>Reconciliation is in progress.</td> <td>Error<br>Warning<br>Reconciled</td> </tr> <tr> <td>Warning</td> <td>Balances are not matched.</td> <td>Reconciled</td> </tr> <tr> <td>Reconciled</td> <td>Balances are matched.</td> <td>-</td> </tr> </tbody> </table>
  - name: Reconciliation - transactions reconciliation
    description: >-
      SDK.finance platform provides the ability to reconcile balances and transactions. <br><b>Transactions reconciliation</b> goal is to compare list of transactions received from external system, for example from third-party provider or from bank, with the list of transactions created in the system. <br>During transactions reconciliation process, the system compares transactions from file with transactions in the system for the specified period and generates the following reconciliation mismatches: <ul> <li><b>Transaction not found</b> - transaction is present in the file but is not found in the system for the specified period.</li> <li><b>Wrong amount</b> - transaction amount in the file is different from transaction amount in the system.</li> <li><b>Wrong currency</b> - currency code in the file is different from the currency in the system.</li> <li><b>Wrong date</b> - date from the file is different from the date in the system.</li> <li><b>Wrong transaction status</b> - transaction status in the system is not “Processed”.</li> </ul> <br>User can resolve reconciliation mismatch. This action will just change mismatch status. <br>The following transactions reconciliation statuses are defined in the system: <table> <thead> <tr> <th><b>Status</b></th> <th><b>Description</b></th> <th><b>Transition Status</b></th> </tr> </thead> <tbody> <tr> <td>In progress</td> <td>Reconciliation is in progress.</td> <td>Error<br>Warning<br>Reconciled</td> </tr> <tr> <td>Error</td> <td>Reconciliation process was not finished, error occurred.</td> <td>In progress</td> </tr> <tr> <td>Warning</td> <td>Reconciliation process is finished, but there are mismatches.</td> <td>In progress<br>Resolved</td> </tr> <tr> <td>Resolved</td> <td>All mismatches were resolved</td> <td>-</td> </tr> <tr> <td>Reconciled</td> <td>All transactions are matched.</td> <td>-</td> </tr> </tbody> </table>
  - name: Reconciliation management
    description: >-
      SDK.finance platform provides the ability to reconcile balances and transactions. <br>This API set allows to view and manage reconciliation configurations, and start reconciliation process for both, balances and transactions reconciliation. <br>APIs specific for balances and transactions reconciliation are explained in the <b>Reconciliation - balances reconciliation</b> and <b>Reconciliation - transactions reconciliation</b> respectively. <br><br>To be able to start reconciliation process, the following actions are required: <ul> <li>Create reconciliation configuration if it has not been created yet. For balances reconciliation configuration defines reconciliation frequency.</li> <li>Create reconciliation record for the specified configuration. For balances reconciliation, reconciliation record is created automatically according to the specified frequency. For transactions reconciliation, reconciliation record is created by calling API.</li> <li>Upload file for transactions reconciliation.</li> <li>Initiate reconciliation process.</li> </ul>
  - name: Reporting
    description: Endpoints for fetch statistics
  - name: Reports
    description: >-
      SDK.finance platform has a dedicated reporting module. This module can be enabled or disabled through configuration settings, offering flexibility based on the requirements. <br>The module leverages Kafka for populating a specialized database used for generating reports, ensuring reliable and efficient processing of reporting data.  <br>The following configuration properties are related to Kafka usage: <code>spring.kafka</code>. <br>The following configuration properties are specific to the reporting module: <code>reports.kafka</code>. <br>This API set enables the management of report generation tasks.
  - name: Roles and permissions management
    description: >-
      SDK.finance platform has a predefined list of default roles, both service and business. <br>The following list of default roles is configured in <code>application.yaml</code> and is applied at the first system start. <br><br>Business roles: <ul> <li>Individual</li> <li>Merchant</li> </ul> <br>Service roles: <ul> <li>Customer Success Specialist</li> <li>KYC Specialist</li> <li>AML Specialist</li> <li>Antifraud Specialist</li> <li>CFO - Chief Financial Officer</li> <li>Financial Specialist</li> <li>Accountant</li> <li>Cashier</li> <li>CRO - Chief Revenue Officer</li> <li>Revenue Specialist</li> <li>Revenue Analyst</li> <li>Role - Administrator</li> <li>Administrator</li> <li>CEO</li> </ul> <br>This API set allows users to view and manage the existing roles and their permissions.
  - name: Schedule
    description: >-
      Use this API set to <b>schedule</b> previously created <b>tasks</b>.  <br>It allows assigning execution schedules to supported task types.  <br>Creation and management of tasks are described in a separate API block <b>Task</b>.
  - name: System health check
    description: Check if server is up and running
  - name: Task
    description: >-
      Use this API set to manage <b>tasks</b> that can later be <b>scheduled</b>. <br>Currently supported task types are: <ul> <li><code>WITHDRAWAL</code></li> <li><code>REPORT</code></li> <li><code>SUBSCRIPTION</code></li> </ul> <br>Scheduling of tasks is described in a separate API block <b>Schedule</b>.
  - name: Templates - Invoice
    description: >-
      <b>Invoice Template</b> functionality allows the <b>Merchant</b> business user to create templates for further <b>Invoice</b> issuing. <br>You can find more detailed information about invoices in the <b>Invoice</b> API description.
  - name: Templates - In-system transfer
    description: >-
      This set of APIs enables the management of in-system transfer templates and their use for executing transfers.
  - name: Templates - Transfer to bank account
    description: >-
      This set of APIs enables the management of templates for transfers to bank accounts (also referred to as withdrawals via bank).
  - name: Templates - View templates
    description: >-
      This API set allows viewing user-created transfer templates for both in-system transfers and bank account transfers.
  - name: Token management
    description: >-
      <b>Token management</b> functionality allows to invalidate auth/refresh tokens.
  - name: Transaction Categories
    description: >-
      <b>Transaction Categories</b> functionality allows business users to manage their spending and view transaction history by Category. <br>Each transaction in the system belongs to a certain business process. <b>Category</b> is the optional parameter for such business processes.  <br>Category should be set for business process types to which the transaction belongs to allow tag this transaction by the user who executes transaction. <br>To set the category to a certain business process is allowed only for administrator or other system user with appropriate permissions.  <br>Administrator or other system user with appropriate permissions is also allowed to manage transaction categories (create, update, or delete).
  - name: Transaction types
    description: >-
      Transaction types
  - name: Transactions management
    description: This API set allows viewing transactions list or transaction details for the specified transaction, and confirm transaction with master PIN or OTP if such confirmation is enabled in the user profile settings. <br>To get more details about transaction confirmation settings check <b>Profile - transactions confirmation settings</b>.
  - name: Transfer by wallet owner
    description: >-
      This set of APIs allows performing in-system transfers using account numbers or in-system cards numbers.  <br>Transfers can be performed between accounts owned by the same user of between different users.  <br>Transfer can be performed only by source account owner, it cannot be performed by any service role on behalf of account owner.  <br>Currency of the source and destination account should be the same. <br>If you need to perform transfer between accounts in different currencies owned by the same user use API to perform currency exchange: `POST /exchange`. <br>If you need to perform transfer between accounts in different currencies owned by different users you can first perform exchange to the destination currency for user initiating transfer and then perform transfer.
  - name: Trusted domains management
    description: >-
      <br>This API set allows Trusted Domains management. <br>Trusted domain - a domain name allowed for use in login emails when creating new system users. <br>Business users are not restricted in registration and can use any login emails. <br>Adding a new trusted domain does not affect already existing user login emails in the system. <br>Usage of trusted domains is disabled by default and can be enabled by setting the application property <code>bootstrap.core.system.trusted-domains.enabled</code> to <code>true</code>.
  - name: Two-factor authentication - TOTP management
    description: >-
      <br>This API set allows users to manage security methods which require two forms of identification to access resources and data with time-based one-time passwords (TOTP). <br>Users can configure usage of TOTP as a method of two-factor authentication (2FA) that uses the current time to generate unique, time-sensitive codes (6 digits by default). <br>These codes are valid for a short period (default 60 seconds) and are generated by an algorithm using the current time as input. <br>TOTP codes are compatible with and can be generated by Google Authenticator or similar applications.
  - name: User actions monitoring
    description: All actions performed in the system are store in the database and can be viewed using APIs
  - name: User contacts list management
    description: This API allows users to manage their contacts list.
  - name: User message API provider
    description: User Message Controller
  - name: User note API provider
    description: User Note Controller
  - name: User self-registration
    description: >-
      SDK.finance platform provides the self-registration flow for users with the business roles: <b>Individual</b>, <b>Merchant</b>. <br>After the user is registered in the system the registration should be confirmed by provided OTP.  <br>OTP is set up as “1111” on the SDK.finance sandbox environment for testing purposes.  <br>Option to have the static OTP and OTP value is configurable in the build parameters `users.registration.static-otp.enabled` and `users.registration.static-otp.code`.  <br>To have static OTP, parameter `notifications.sms.provider` should be setup as `logSmsSender`.
  - name: Users management
    description: >-
      There are two groups of roles in the system: <ul> <li>Business roles - roles that use system to operate with their own accounts</li> <li>Service roles - roles for system management</li> </ul> <br>Users with service roles are able to manage users in the system. <br>Default users with the following roles are created: <br><br><b>Service roles</b> <ul> <li>Administrator</li> <li>Accountant</li> <li>Compliance manager</li> <li>Cashier</li> </ul> <br><b>Business roles</b> <ul> <li>Individual</li> <li>Merchant</li> </ul> <br>You can use these users to operate with our sandbox using sample credentials which you can find in the description of the API <code>/authorization</code>.
  - name: Validation for coin
    description: Validate Coin Controller
  - name: Validation for in-system card
    description: In-system Card Validate Controller
  - name: Validation for user contact
    description: Validate Contact Controller
  - name: Wallet management
    description: >-
      This set of APIs allows account management operations within the platform for both <b>Account owners</b> and <b>Service users</b> with appropriate permissions.   <br><br> <b>Account owners</b> can perform all actions related to their own accounts or company accounts that belong to them.   <br>This applies to all user types (Service and Business users) and to all available account types.   <br><br> <b>Service users</b> with the required permissions can: view information about client, system and service accounts; Create accounts on behalf of business users when permitted <br>All other actions with `client` type accounts are restricted and can be performed only by the respective <b>Account owner</b>.
  - name: Wallet management by owner
    description: >-
      This set of APIs allows the account management in the platform only for <b>Account owner</b>.  <br>It is applicable for all types of users (Service and Business users) and to all available account types.  <br>View the `client` type of accounts (accounts of business users) is also available to the service users with the appropriate permissions.  <br>But all other actions with the `client` type of accounts are available only to the <b>Account owner</b>.
  - name: Wallet management by service roles
    description: >-
      This set of APIs allows service users with appropriate permissions to view account information of system and service users accounts, and to create account on behalf of business user.
  - name: Wallet top-up via bank transfer
    description: >-
      Top-up from a bank account is the way to load money to the account which can be done with or without bank integration. <br>SDK.finance platform provides two options to perform the bank top-up: <ul> <li>Directly without confirmation by the accountant</li> <li>With confirmation, when the customer initiates the request and the accountant confirms the request when the transfer is received</li> </ul> <br>The customer performs a usual bank transfer to the special transit account with specifying account ID (account number). <br>These transfers are processed on the bank side. Then, top-up via bank can be performed in the following ways: <ul> <li>From the UI</li> <li>By calling API manually</li> <li>Using bank integration</li> </ul> <br>To be able to perform top-up via bank: <ul> <li>Bank should be added to the system using API <code>POST /bank-catalog</code></li> <li>Operation <b>Top-up via bank</b> should be activated in the fees on UI or using APIs from the <b>Contract management - fee profiles</b></li> <li>Bank account should be created and linked to the account on UI or using <b>Bank accounts management</b> APIs.</li> </ul>
  - name: Wallet top-up via cash desk
    description: >-
      Account top-up via cash desk is different from other top-ups in its accounting which is developed in a way that allows tracking balances for both entities: <ul> <li>Cash desk, where top-up is performed</li> <li>Business user, whose account was topped up</li> </ul> <br>Top-up via cash desk can be used when cash is physically input to the cash desk or self-service device, like a kiosk or ATM. <br>To represent it in the system, money is loaded to both accounts, cash desk and client. <br>Account top-up via the cash desk can be done by the service user, usually the cashier of the definite cash desk, with appropriate permissions only if the working day for this cash desk is opened. <br>Check <b>Cash-desk - working day management</b> for more information.
  - name: Wallets
    description: >-
      <b>Account</b> is an internal entity in the system, which represents a fund balance in a specified currency.  <br>In the code, <b>Account</b> is named as <code>coin</code>.  <br>On UI and in the platform documentation, you may also find the term <b>wallet</b> instead of an account (<code>coin</code>). <br>Each account has the following parameters:  <ul> <li><code>type</code> - purpose of the account</li> <li><code>currency</code> - currency of the account</li> <li><code>level</code> - at which level in the system account is created. For each level, separate account is created for each currency.</li> </ul> <br>Account is linked to the <code>organization</code>, for which this account is created. <br><br>The following account types are created in the SDK.finance platform: <table> <thead> <tr> <th>Account type</th> <th>Level</th> <th>Description</th> </tr> </thead> <tbody> <tr> <td><code>client</code></td> <td>Business user</td> <td>Accounts owned by business users (individual, merchant). It is created by the business user or by the service user on behalf of the business user.</td> </tr> <tr> <td><code>prepaid</code></td> <td>Business user</td> <td>Special type of the account for prepaids. It is created when user creates a prepaid. Prepaids can be purchased by business users with a specific denomination and withdrawed for goods or services later on.</td> </tr> <tr> <td><code>cash</code></td> <td>Cash desk</td> <td>Account for cash desk. It is created automatically: - for existing cash desks for the definite currency, when fee for cash desk operation is configured in any contract - when new cash desk is created, for all currencies, for which fees for cash desk operations are configured at the moment of cash desk creation. Cash desk operations: cash_desk_redeem, cash_desk_charge.</td> </tr> <tr> <td><code>reserve</code></td> <td>System</td> <td>Account for cash which is being transferred between cash desks. It is created automatically for the definite currency when fee for cash desk operation is configured in any contract for any cash desk.</td> </tr> <tr> <td><code>gate</code></td> <td>Provider</td> <td>Account for provider settlement money flow for provider operations. Works as transit account and when operation is completed balance of this account should be 0.</td> </tr> <tr> <td><code>exchange_reserve</code></td> <td>System</td> <td>Account for exchange reserve for Currency Exchange operation. It is created automatically for the definite currency when fee for exchange operation is configured in any contract.</td> </tr> <tr> <td><code>system_gate_commission</code></td> <td>System</td> <td>Account for accounting of fee paid to specified third-party provider for transaction processing. It is created automatically for the definite currency when fee for provider operation is configured in any contract.</td> </tr> <tr> <td><code>debt_gate_settlement</code></td> <td>Provider</td> <td>Account to account money that the system paid to provider because provider fee is greater than fee deducted from the client. Such operation is possible if debtAllowed=true for the provider. This account allows negative balance. It is created automatically for the definite currency when fee for provider operation is configured in any contract.</td> </tr> <tr> <td><code>debt_gate_commission</code></td> <td>Provider</td> <td>Account to account provider fee that is not covered by fee deducted from the client, because provider fee is greater than fee deducted from the client. Such operation is possible if debtAllowed=true for the provider. It is created automatically for the definite currency when fee for provider operation is configured in any contract.</td> </tr> <tr> <td><code>technical_transit</code></td> <td>System</td> <td>Transit account for money movement consistency. When the operation is completed the balance of this account must be 0. It is created automatically for each operation.</td> </tr> <tr> <td><code>technical_transit</code></td> <td>Provider</td> <td>Transit account for money movement consistency for external operations. When the operation is completed the balance of this account must be 0. It is created automatically for each external operation.</td> </tr> <tr> <td><code>system_commission</code></td> <td>System</td> <td>Account for accounting of fees earned by the system. It is created automatically for the definite currency when fee is configured in any contract.</td> </tr> <tr> <td><code>issuing_balance</code></td> <td>System</td> <td>Account for money issued in the system (shows circulation money volume). It is created automatically for the definite currency when fee for any operation is configured in any contract.</td> </tr> </tbody> </table>
  - name: Webhook event
    description: >-
      This API set enables the management of webhook events. <br>Webhook events are used to notify external systems about significant occurrences within the platform.
  - name: Withdrawal via bank
    description: >-
      Withdrawal via bank can be used when it is required to perform bank transfer by the provided account details on the bank side along with withdrawal money from the account. <br>It can be used for cash withdrawal from the account as well, as this operation can also be considered a bank transfer from the electronic money account to the cash-to-withdraw. <br>Exact accounting on the bank side depends on the business model. <br><br>SDK.finance platform provides the following possible options to perform withdrawal via bank: <ul> <li><b>Without confirmation</b> — performed by service user with the appropriate permission. Can be used, for example, when customer initiates withdrawal in the bank branch and it is not necessary to initiate and approve this operation in the platform</li> <li><b>With confirmation</b> — when customer initiates request in the application and it should be confirmed by accountant.</li> </ul> <br><br>Withdrawal via bank success flow with confirmation: <ul> <li>The business user initiates <b>withdrawal via bank</b> request and provides destination bank account details. When the request is initiated, money is held on the user account.</li> <li>The service user with the appropriate permission (Accountant) reviews the initiated request and approves or declines it.</li> <li>When the request is approved, money is withdrawn from user account and bank transfer should be performed manually on the bank side or via integration with the bank (integration should be developed).</li> </ul> <br><br>To be able to perform withdrawal via bank: <ul> <li>Bank should be added to the system using API <code>POST /bank-catalog</code></li> <li>Operation <b>withdrawal via bank</b> should be activated in the fees on UI or using APIs from the <b>Contract management - fee profiles</b></li> <li>Bank account should be created and linked to the account on UI or using <b>Bank accounts management</b> APIs.</li> </ul>
  - name: Withdrawal via cash desk
    description: >-
      Withdrawal via cash desk can be used when it is required to provide cash to customer and reflect the operation of withdrawal on both, the user and the cash desk account. <br>This operation is possible only if there is enough money on the cash desk account as well as on the user account. <br>When the operation is performed, money is withdrawn from both, the cash desk and the user accounts. <br><br>Withdrawal via cash desk involves the following parties: <ul> <li>User with business role who initiates withdrawal by creating request</li> <li>User with service role (Accountant) who approves or declines the created request</li> <li>User with service role (Cashier) who accepts the approved by accountant request and gives cash to the user</li> </ul> <br><br>Possible flow for withdrawal via cash desk: <li>The business user chooses the required cash desk where to receive cash  <li>Fee for withdrawal via cash desk is shown to the user <li>The user checks the fee and creates withdrawal request <li>The service user with the appropriate permission, e.g. Accountant, approves or decline the withdrawal request <li>The service user with the appropriate permission, e.g. Cashier, accepts the approved withdrawal request and gives money to the business user <br><br>Withdrawal via cash desk can have the following statuses (`requestStatus`):  <li>`pending` - when it is  initiated by business user <li>`approved_by_accountant` - when it is approved by the accountant <li>`declined` - when it is declined by accountant <li>`processed` - when it is accepted by cashier.
  - name: Cash desk - cash collect management
  - name: Cash desk - cash inputs management
  - name: Cash desk - cash investments management
paths:
  /v1/qr-codes:
    post:
      tags:
        - QR code generation
      summary: Generate QR code
      security:
        - BearerAuth: []
      description: >
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to generate QR code from provided URL. The API returns QR code as PNG image in byte array format. </div>

      operationId: generateQRCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QRCodeGenerationReq'
        required: true
      responses:
        '200':
          description: QR code generated successfully
          content:
            "image/png":
              schema:
                type: string
                format: byte
                description: QR code image in PNG format as byte array
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
      deprecated: false
  /v1/asset-balance/view:
    post:
      tags:
        - Reconciliation - balances reconciliation
      summary: View the list of currency balances
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to get the list of currency balances and collected fees for the last closed operation day. </div>
      operationId: viewAssetBalances
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetBalanceFilterReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetBalanceResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/totp:
    post:
      tags:
        - Two-factor authentication - TOTP management
      summary: Complete two-factor authentication setup by first TOTP verification
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to complete two-factor authentication setup by first TOTP verification. <br>Pass valid TOTP code in request body. </div>
      operationId: completeTotpSetup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpSetupReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpSetupResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/authorization:
    post:
      tags:
        - Authorization
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to get an access and refresh token. If dual authentication is not enabled for the specified user, you will receive the token along with other user parameters in the response. <br>Provide the received access token as a Bearer token to authenticate other APIs. <br>Pass the received refresh token in the request body in the API <code>PUT /authorization</code> to refresh the access token. <br><br>The following service roles and credentials can be used: <ul> <li>Administrator: <code>administrator@sdkfinance.tech</code></li> <li>Accountant: <code>accountant@sdkfinance.tech</code></li> <li>AML Specialist: <code>aml_specialist@sdkfinance.tech</code></li> <li>CEO: <code>ceo@sdkfinance.tech</code></li> <li>Compliance manager: <code>kyc_specialist@sdkfinance.tech</code></li> <li>CRO: <code>cro@sdkfinance.tech</code></li> <li>Customer success specialist: <code>customer_success_specialist@sdkfinance.tech</code></li> <li>Financial specialist: <code>financial_specialist@sdkfinance.tech</code></li> <li>KYC specialist: <code>kyc_specialist@sdkfinance.tech</code></li> <li>Role administrator: <code>role_administrator@sdkfinance.tech</code></li> </ul> <br>The following business roles and credentials can be used: <ul> <li>Individual: <code>individual@sdkfinance.tech</code></li> <li>Merchant: <code>merchant@sdkfinance.tech</code></li> </ul> <br>The sample password for all mentioned users is <code>1</code>. <br>If dual authentication is enabled for the specified user, an OTP will be sent to the provided credentials. In this case, the <code>maskedPhoneNumber</code> to which the OTP was sent is returned in the response. <br>The received OTP should be provided in the API <code>POST /authorization/confirm</code> to get the token. </div>
      summary: Get access token to authenticate other APIs for users without enabled dual authentication
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
    put:
      tags:
        - Authorization
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to refresh an access token. The refreshed token allows users to continue authenticating other APIs without needing to log in again. <br>Provide the refresh token in the request body. <br>Upon successful refresh, the API returns a new access token along with its expiration time. </div>
      summary: Refresh access token
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: The refresh token provided during the initial authorization response.
              required:
                - refreshToken
        required: true
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
    delete:
      tags:
        - Authorization
      summary: Delete access token
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to delete the access token and log out from the system. <br>A successful operation returns a <code>204 No Content</code> status, indicating that the token has been successfully deleted. <br>No special permission is required to call this API. However, if the user does not have a valid access token, a <code>403 Forbidden</code> response will be returned. </div>
      operationId: logout
      responses:
        '204':
          description: No content
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
      deprecated: false
  /v1/authorization/confirm:
    post:
      tags:
        - Authorization
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to pass the received OTP and get an access token. You will receive the token along with other user parameters in the response. <br>Provide the received token as a Bearer token to authenticate other APIs. </div>
      summary: Pass the received OTP and get access token to authenticate other APIs for users with enabled dual authentication
      operationId: loginConfirmByOtp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateOtpReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/authorization/totp:
    post:
      tags:
        - Authorization
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to pass generated TOTP and get an access token. You will receive the token along with other user parameters in the response. <br>Provide the received token as a Bearer token to authenticate other APIs. </div>
      summary: Pass the generated TOTP and get access token to authenticate other APIs for users with enabled two-factor authentication
      operationId: loginWithTotp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateTotpReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  /v1/authorization/resend-otp:
    post:
      tags:
        - Authorization
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to resend OTP for authorization if it was not received or if it has expired.  <br>OTP will be sent to the provided credentials if a user with the provided credentials exists in the system.  <br>The received OTP should be passed in the API <code>POST /authorization/confirm</code> to get the access token. <br>In case the OTP cannot be resent because the timeout period for resend has not yet expired, the following error is returned:  <br><b>The confirmation code is not yet available for resend. Try again in N seconds</b>. </div>
      summary: Resend OTP for authorization
      operationId: resendOtpForLoginConfirmation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendConfirmationReq'
        required: true
      responses:
        '204':
          description: No content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
