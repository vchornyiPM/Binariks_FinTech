  '/v1/profiles/{userId}/security-settings':
    patch:
      tags:
        - Profile management by service role
      summary: Manage security settings by service user
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to manage the following security settings for the specified user: <ul> <li>Enable or disable two-factor authentication.</li> <li>Enable or disable phone, email, or push/in-application notifications for the specified user.</li> <li>Specify where the OTP for sensitive operation confirmation should be sent.</li> </ul> <br>The following notifications can be managed (use <code>notificationEventType</code> to set the required notification type): <ul> <li>Transaction notifications (<code>notificationEventType</code>: <code>TRANSACTION</code>)</li> <li>Authorization notifications (<code>notificationEventType</code>: <code>AUTHENTICATION</code>)</li> <li>KYC identification status change (<code>notificationEventType</code>: <code>KYC_IDENTIFICATION_STATUS_CHANGE</code>)</li> <li>Profile update required (<code>notificationEventType</code>: <code>PROFILE_UPDATE_REQUIRED</code>)</li> <li>Reset identification request approved (<code>notificationEventType</code>: <code>RESET_IDENTIFICATION_REQUEST_APPROVED</code>)</li> <li>Account blocked (<code>notificationEventType</code>: <code>ACCOUNT_BLOCKED</code>)</li> <li>Password recovery (<code>notificationEventType</code>: <code>PASSWORD_RECOVERED</code>)</li> <li>Report ready (<code>notificationEventType</code>: <code>REPORT_DONE</code>)</li> <li>Profile document declined (<code>notificationEventType</code>: <code>PROFILE_DOCUMENT_DECLINED</code>)</li> <li>Prepaid PIN generated (<code>notificationEventType</code>: <code>PREPAID_VOUCHER_PIN_GENERATED</code>)</li> <li>Investigation initiated (<code>notificationEventType</code>: <code>INVESTIGATION_CREATED</code>)</li> </ul> <br>Transaction and authorization notifications can only be enabled if the email or phone number is verified. <br>To verify user contact information, use API <code>POST /profiles/my/contact</code>. <br>To specify where OTP for confirmation should be sent, use <code>notificationEventType</code>: <code>SENSITIVE_OPERATION_CONFIRMATION</code>. <br>Information that is not provided in the API request will remain unchanged. </div>
      operationId: updateUserProfileSecuritySettings
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ParameterStringWithConstrains'
          description: Internal User ID. UserId is returned in the API response for user registration POST `/users` or can be taken from the API `POST /users/view`.
      requestBody:
        description: Request to update security settings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityUpdateReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewProfileResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
