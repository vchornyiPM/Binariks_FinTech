  /v1/reconciliation/config:
    post:
      tags:
        - Reconciliation management
      summary: Create reconciliation configuration
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to create reconciliation configuration if it has not been created yet. <br>Reconciliation configuration should exist to run the reconciliation process.  <br>Only one configuration can exist for transactions reconciliation and for each currency. <br>Reconciliation configuration is created automatically:  <li>For balances reconciliation, the configuration is created when creating currency. It is created with frequency <code>NONE</code>.  <li>For transactions reconciliation, the configuration is created during system setup or with the deployment of the version that contains reconciliation functionality.  <br>Pass reconciliation type, <code>asset</code> for balances reconciliation and <code>transactions</code> for transactions reconciliation,  in the <code>reconciliationType</code> in the request body.  <br>Pass configuration name in the <code>name</code> in the request body.  <br>For <code>transactions</code> reconciliation type, no other parameters is required. <br>For <code>asset</code> reconciliation type, pass also the following parameters:  <li>Internal currency ID in <code>currencyId</code>. It can be taken from <code>id</code> in the response of API <code>POST /currencies/view</code>. <li>Reconciliation frequency in <code>frequency</code>.  <br><br>The following frequency can be set:  <li><code>NONE</code>: reconciliation record will not be created automatically <li><code>DAILY</code>: reconciliation record will be created every day, reconciliation period - calendar day <li><code>WEEKLY</code>: reconciliation record will be created every Monday, reconciliation period - from Monday to Sunday <li><code>MONTHLY</code>: reconciliation record will be created every first day of the month, reconciliation period - calendar month <li><code>BIMONTHLY</code>: reconciliation record will be created every two months, reconciliation period - two calendar months <br><br>Reconciliation record for balances reconciliation is created by system timer that is set for daily run at 01:00 AM and at 07:00 AM.  <br>This setting can be changed using the following environment variable:  <br><code> <br>reconciliation:

          <br>&ensp;&ensp;period-creation-timer:
            <br>&ensp;&ensp;&ensp;&ensp;enabled: true
            <br>&ensp;&ensp;&ensp;&ensp;schedule-expression: '0 0 1,7 * * ?' # cron expression
        </code> <br><br>In the response, you will receive configuration ID with all configuration details.
      operationId: createReconciliationConfigurations
      requestBody:
        description: Request to create reconciliation configurations
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationConfigCreateReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationConfigDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
