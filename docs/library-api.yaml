        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to duplicate a contract with the option to specify whether to copy fees and limits. <br>Pass the required contract ID in the <code>contractId</code> request URL parameter. <br>Specify the new contract name and whether to copy the fees and limits in the request body. <br>Limits can only be copied along with fees. <br>Pass the monthly fee ID in <code>monthlyFeeId</code> in the request body if you need to link a monthly fee to the contract. <br>The monthly fee ID can be taken from the <code>id</code> field in the response of the API <code>POST /system-vendor/monthly-fees/view</code>. <br>You can also specify up to three selling points for the contract. <br>Pass the required locale and selling points in the <code>sellingPoints</code> section. <br>To add selling points in another locale, call API <code>PUT /contracts/{contractId}/selling-points</code>. <br>In the response, you will receive the new contract ID along with contract details. </div>
