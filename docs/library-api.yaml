      oneOf:
        - $ref: '#/components/schemas/CloseCoinWithCoinTransfer'
        - $ref: '#/components/schemas/CloseCoinWithIbanTransfer'
        - $ref: '#/components/schemas/CloseCoinWithZeroBalance'
      discriminator:
        propertyName: transferType
        mapping:
          coin_transfer: '#/components/schemas/CloseCoinWithCoinTransfer'
          iban_transfer: '#/components/schemas/CloseCoinWithIbanTransfer'
          coin_zero_balance: '#/components/schemas/CloseCoinWithZeroBalance'
