        expiration:
          type: string
          description: Expiration date in MMyy format
        expirationTime:
          type: string
          format: date-time
          description: Expiration date and time, in UTC
        cvvNumber:
          type: string
          description: Three-digit card verification value (CVV2 or CVC2) printed on the card
        chipCvvNumber:
          type: string
          description: Three-digit card verification value (ICVV) stored on the chip of the card
        barcode:
          type: string
          description: Barcode printed on the card, expressed as numerals. 10-20 chars
        pinIsSet:
          type: boolean
          description: Specifies if the personal identification number (PIN) has been set for the card. 4 chars
        state:
          $ref: '#/components/schemas/CardState'
        stateReason:
          type: string
          description: |
            Descriptive reason for why the card is in its current state. For example, "Card activated by cardholder".
        fulfillmentStatus:
          type: string
          enum:
            - issued
            - ordered
            - reordered
            - rejected
            - shipped
            - delivered
            - digitally_presented
          x-enum-varnames:
            - issued
            - ordered
            - reordered
            - rejected
            - shipped
            - delivered
            - digitally_presented
          example: 'issued'
          description: Card fulfillment status.
        reissuePanFromCardToken:
          type: string
          description: "Reissues the specified card (known as the \"source\" card).\nThis field reissues a card by copying the primary account number (PAN) and personal identification number (PIN)\nfrom the specified source card to the newly created card. The reissued card has the same PAN and PIN as \nthe source card but a new expiration date and CVV2 number.\nNOTE: By default, the source card is automatically terminated when the reissued card is activated. \nHowever, if your program is configured for multiple active cards, you can prevent the source card from being\nautomatically terminated by setting the activation_actions.terminate_reissued_source_card field to false.\n"
        newPanFromCardToken:
          type: string
          description: |
            Reissues the specified card (known as the "source" card) with a new primary account number (PAN).
            This field reissues a card with a new PAN from the specified source card. The source card is automatically
            terminated when the card is reissued with the new PAN. Use this field when reissuing a lost or stolen card.
        fulfillment:
          type: object
          description: Determines physical characteristics of a card and shipment information.
        bulkIssuanceToken:
          type: string
          description: Unique ID of the bulk card order
        translatePinFromCardToken:
          type: string
          description: Copies the personal identification number (PIN) from the specified source card to the newly created card
        activationActions:
          $ref: '#/components/schemas/ActivationActionsData'
        instrumentType:
          type: string
          enum:
            - physical_msr
            - physical_icc
            - physical_contactless
            - physical_combo
            - virtual_pan
          x-enum-varnames:
            - physical_msr
            - physical_icc
            - physical_contactless
            - physical_combo
            - virtual_pan
          description: Instrument type of the card.
          example: 'physical_msr'
        expedite:
          type: boolean
          description: Set to true to request expedited processing of the card by your card fulfillment provider
        metadata:
          type: object
          additionalProperties:
            type: string
        contactlessExemptionCounter:
          type: integer
          description: "Running count of the contactless transactions successfully completed since the last strong customer \nauthentication (SCA) challenge was issued. You can limit the number of contactless transactions that \ncan be performed without issuing an SCA challenge at the card product level.\n"
          example: 5
          format: int32
        contactlessExemptionTotalAmount:
          type: number
          description: "Running total of the money spent in contactless transactions successfully completed since the last strong\ncustomer authentication (SCA) challenge was issued. You can limit the total amount that \ncan be spent in contactless transactions without issuing an SCA challenge at the card product level.\n"
      description: Card data
    ActivationActionsData:
      title: ActivationActionsData
