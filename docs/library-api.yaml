      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to change the contract name, activate or deactivate the contract, or add/change the monthly fee. <br>Pass the required contract ID in the <code>contractId</code> request URL parameter. <br>The contract ID can be taken from the <code>id</code> field in the response of the API <code>POST /contracts/view</code>. <br>Pass the contract name and other fields to update in the request body. <br>You can update the contract name, change its active status, or modify the monthly fee. <br>To add or change the monthly fee, provide a new monthly fee ID in the <code>monthlyFeeId</code> field. <br>The monthly fee ID can be taken from the <code>id</code> field in the response of the API <code>POST /system-vendor/monthly-fees/view</code>. <br>When the monthly fee is changed, the next charge date for existing users remains unchanged. The fee amount will be charged based on the monthly fee linked to the contract at the time of charging. <br>To assign a contract with a monthly fee to a user, their main account must have enough balance in the fee currency. <br>If a user has a contract with a monthly fee but insufficient funds, the system will automatically switch the user to the default base contract, which must be free of charge. <br>Do not assign a monthly fee to default base or standard contracts. Otherwise, the system will return an error during the user registration or compliance approval processes. </div>
      operationId: updateContract
      parameters:
