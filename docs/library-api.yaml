      properties:
        terminateReissuedSourceCard:
          type: boolean
          description: "If you are reissuing a card, the source card is terminated by default. \nTo prevent the source card from being terminated, set this field to false.\nOnly relevant when reissue_pan_from_card_token is set. Default value: true.\n"
          example: true
        swapDigitalWalletTokensFromCardToken:
          type: string
          description: Moves all digital account tokens from the specified card to the new card.
      description: Defines actions to execute when the card is activated. The fields in this object are mutually exclusive.
