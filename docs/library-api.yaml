      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to approve or decline an account closing request by request ID. <br>Pass the account closing request ID in the <code>id</code> in the request URL. <br>The account closing request ID can be taken from the <code>requestId</code> field in the response of API <code>GET /coin/close-requests</code>. <br>When the request is approved: <ul> <li>Money is withdrawn from the account.</li> <li>Account status is updated (<code>active</code> is set to <code>false</code> and <code>deactivationReason</code> to <code>account_closed</code>).</li> <li>Status of the request is changed to <code>approved</code>.</li> </ul> </div>
