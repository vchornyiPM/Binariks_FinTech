tags:
  - name: User Activity
    description: Compliance Monitoring
  - name: Agreement document management
    description: >-
      This API set allows users to manage agreement documents.
  - name: API list
    description: >-
      This API set provides users with information about all endpoints, the permissions required to call them, and the roles that have these permissions.
  - name: Application properties
    description: >-
      This API set enables the management of certain application properties that need to be configured at the system level.
  - name: Authorization
    description: >-
      The SDK.finance APIs use a Bearer access token to authenticate requests. <h3>Generate access token</h3> To get access token use `POST /authorization` API. Sample credentials are provided in the API description. <h3>Refresh access token</h3> In order to refresh an access token use refresh token and call `PUT /authorization` API. <h3>Using access token</h3> Once you obtain the access token it can be used to access other SDK.finance APIs.  <br>Token should be provided in the `Authorization` header: `Authorization: Bearer {{token}}`  or `-H 'Authorization: Bearer {{token}}'`  for `curl` <br>If you use swagger, provide the received token in the `BearerAuth` value. <br><br><b>All SDK.finance APIs can be called by authorized users with appropriate permissions, unless otherwise specified in the API description. <br>To check permissions and which roles have these permissions, call API:</b> <code>GET /api-list</code>.
  - name: Available IP
    description: >-
      Use this API set to white-list IPs for access by the specified roles.  <br>If the white list is empty access is allowed from any IP.  <br>If the white list is not empty access is allowed only from the IP specified in the list.
  - name: Bank accounts management by business roles
    description: >-
      Business user (<b>Individual</b>, <b>Merchant</b>) is able to view and manage their bank accounts.  <br>Bank account is linked to the in-system account and should be created to perform the following operations with in-system accounts: <ul> <li>Top-up in-system account from bank account</li> <li>Transfer from in-system account to bank account</li> </ul> <br>If bank account is created by business user it should be approved by compliance so that it can be used. <br>To support business case when users do not have their personal bank account, pool bank account can be created by service user and can be used for top-up operation.
  - name: Bank accounts management by service roles
    description: >-
      User with service role is able to manage bank accounts on behalf of business users if it is required.  <br>To support business case when users do not have their personal bank account, pool bank account can be created by service user and can be used for top-up operation.  <br>Compliance should approve bank account created by business user so that it can be used.
  - name: Bank catalog management
    description: >-
      To be able to create a bank account and link it to the system account bank should be added to the system, first.  <br>It is possible to create banks one by one or to upload a list of banks in the defined format.
  - name: Business request management
    description: >-
      Use this API set to view, confirm, or decline requests to perform an operation if required.<br> It also allows repeating or rejecting an operation that was declined due to limit exceedance.<br> Management of business requests is permission-based.<br> To manage a specific business request type, the caller must have the corresponding Permission.<br> <b>Permissions by business request type:</b> <ul> <li><code>BUSINESS_REQUEST_EXCHANGE_RESERVE_TOP_UP</code> — Exchange Reserve Top-up </li> <li><code>BUSINESS_REQUEST_EXCHANGE_RESERVE_WITHDRAWAL</code> — Exchange Reserve Withdrawal </li> <li><code>BUSINESS_REQUEST_BANK_TOP_UP</code> — Top-up via Bank</li> <li><code>BUSINESS_REQUEST_BANK_WITHDRAWAL</code> — Withdrawal via Bank</li> <li><code>BUSINESS_REQUEST_CASH_DESK_CHARGE</code> — Top-up via Cash Desk</li> <li><code>BUSINESS_REQUEST_CASH_DESK_WITHDRAWAL</code> — Withdrawal via Cash Desk</li> <li><code>BUSINESS_REQUEST_CASH_DESK_INVESTMENT</code> — Cash Desk Deposit</li> <li><code>BUSINESS_REQUEST_CASH_DESK_COLLECT</code> — Cash Desk Output</li> <li><code>BUSINESS_REQUEST_CASH_DESK_INPUT</code> — Cash Desk Input</li> <li><code>BUSINESS_REQUEST_TRANSFER</code> — Transfer</li> <li><code>BUSINESS_REQUEST_CURRENCY_EXCHANGE</code> — Currency Exchange</li> <li><code>BUSINESS_REQUEST_GATE_CARD_ATTACHMENT</code> — Provider Card Attachment</li> <li><code>BUSINESS_REQUEST_GATE_TOP_UP</code> — Top-up via Provider</li> <li><code>BUSINESS_REQUEST_GATE_WITHDRAWAL</code> — Withdrawal via Provider</li> <li><code>BUSINESS_REQUEST_GATE_PURCHASE</code> — Purchase via Provider</li> <li><code>BUSINESS_REQUEST_GATE_ISSUE_CARD</code> — Issue Card via Provider</li> <li><code>BUSINESS_REQUEST_GATE_TOKENIZATION</code> — Provider Tokenization</li> <li><code>BUSINESS_REQUEST_MERCHANT_PAYMENT_CASHBACK</code> — Merchant Payment Cashback</li> <li><code>BUSINESS_REQUEST_MERCHANT_INVOICE_CASHBACK</code> — Merchant Invoice Cashback</li> </ul>
  - name: Callback settings for non-merchant operations
    description: Callback Settings Controller
  - name: Card controller
    description: Card Controller
  - name: Cart Templates
    description: Cart Templates
  - name: Cash desk - cash management
    description: >-
      Cash management for the cash desks is used to handle balances required for everyday cash desk operations.  <br>All cash management operations are initiated by the accountant and should be accepted by the cashier using the request ID received in the initiation response.  <br>There are the following system operations related to the cash management: <ul> <li><b>Cash desk deposit</b> - put cash in the cash desk. Method issues funds within the SDK.finance system and increases the selected cash desk account balance.  This balance later can be used for withdrawals or transfers to other cash desks.  The cashier enters the received from the accountant request ID, checks that all information is correct and completes the process.</li> <li><b>Cash desk output</b> - is one of two operations that allow the transfer of cash between cash desks:  this operation performs transfer from the cash desk account to a special reserve account.  Reserve account shows the amount of money which is being transferred from one cash desk to another.  The cashier enters received from the accountant request ID, checks that all information is correct and completes the process.</li> <li><b>Cash desk input</b> - is one of two operations that allow the transfer of cash between cash desks.  This operation performs transfer from the reserve account to the cash desk account.  The cashier enters received from the accountant request ID, checks that all information is correct and completes the process.</li> </ul>
  - name: Cash desk - working day management
    description: >-
      For working with cash desk it is required to manage working days: view current day status, open or close working day.  <br>Cash Desk working day is the day during which cash operations are possible. If the working day is closed operations with cash desk are not allowed. <br>User with the appropriate permissions is able to open working day and initiate closing of working day.  <br>Closing of the working day should be confirmed by another user with the appropriate permissions.
  - name: Cash desk management
    description: >-
      Use this API set for cash desk management. <br>Cash desk is created automatically when a cashier is created in the system. <br>To create a cashier, use API <code>POST /v1/users</code> with the role <b>Cashier</b>. <br>The list of currencies available in the cash desk is defined at the moment of its creation  and includes all currencies existing in the system at that time.
  - name: Cash desk operations
    description: >-
      This API set allows users to view cash desk operations.
  - name: Company management
    description: >-
      Business user with the role <b>Individual</b>, who has passed the new KYC verification and is approved by compliance can create companies. <br>To proceed with the company onboarding process, the following steps are required: <ul> <li>Fill in the company information using APIs from the <b>Organization Profile Management</b>.</li> <li>Add company representatives using APIs from <b>Company Representative Management</b>.</li> <li>Add shareholders using APIs from <b>Company Shareholder Management</b>.</li> <li>Upload company documents and shareholder documents using APIs from <b>Organization Profile Document Management</b>.</li> </ul> <br>After all required information is provided and the documents are uploaded, the user can submit the company for compliance review. <br>Once the company is approved by compliance, the user can open accounts for the company and perform transactions.
  - name: Company shareholder management
    description: >-
      Company shareholder management
  - name: Company representative management
    description: >-
      Company representative management
  - name: Contract Fees
    description: >-
      Use this API set to view fees associated with contracts. This includes retrieving detailed information about monthly fees for specific contracts.
  - name: Contract management
    description: >-
      <b>Contract</b> is linked to the user organization and determines the following set of rules: <ul> <li>allowed transaction types in each available currency</li> <li>fees for each transaction type in each currency</li> <li>limits for each transaction type in each currency</li> <li>available products from 3rd party provider (integration with the provider is required)</li> <li>available providers for external transactions (integration with the provider is required)</li> </ul> <br>Only active contracts can be assigned to the users.  <br>The contract consists of: <ul> <li><code>Fee profiles</code> -  define transaction types for applying fees and if operation is allowed or not</li> <li><code>Fee rules</code> - are linked to the fee profile and define period of fee validity</li> <li><code>Fee conditions</code> - are linked to the fee rule and define fee ranges and values</li> <li><code>Limit rules</code> - are linked to the fee profile and define limit settings for particular transaction types</li> </ul> <br>Management of the fee profiles, fee rules, and fee conditions are described in the following folders:  <ul> <li><code>Contract management - fee profiles</code></li> <li><code>Contract management - fee rules</code></li> <li><code>Contract management - fee rule conditions</code></li> <li><code>Contract management - limit rules</code></li> </ul> <br>Contracts are divided by the person type, to which contracts can be linked.  <br>By default, one contract is configured in the system for each person type.  <br>The following person types (<code>personType</code>) are pre-configured: <ul> <li><code>Base</code></li> <li><code>Standard</code></li> <li><code>Gold</code></li> <li><code>VIP</code></li> </ul> <br>The person type and the linked contract is configured by default to be changed automatically during the onboarding process: <ul> <li>After registration, users have <code>personType = base</code> and the default contract related to the base person type.</li> <li>After the user is verified, the <code>personType</code> is automatically changed to <code>standard</code> and the contract is changed to the default contract related to the standard person type.</li> </ul> <br>This behaviour can be changed in the system configuration by updating <code>newPersonType</code> from <code>standard</code> to <code>base</code> for the required <code>organizationType</code> (<code>individual</code>, <code>merchant</code>) for <code>compliance.approval</code> parameter.  <br>The default configuration is:  <br><code>compliance:</code> <br>&nbsp; <code>approval:</code> <br>&nbsp; &nbsp; <code>- organizationType: 'individual'</code> <br>&nbsp; &nbsp; &nbsp; <code>newPersonType: 'standard'</code> <br>&nbsp; &nbsp; <code>- organizationType: 'merchant'</code> <br>&nbsp; &nbsp; &nbsp; <code>newPersonType: 'standard'</code> <br>To keep <code>base</code> person type after approval, configuration should be: <br><code>compliance:</code> <br>&nbsp; <code>approval:</code> <br>&nbsp; &nbsp; <code>- organizationType: 'individual'</code> <br>&nbsp; &nbsp; &nbsp; <code>newPersonType: 'base'</code> <br>&nbsp; &nbsp; <code>- organizationType: 'merchant'</code> <br>&nbsp; &nbsp; &nbsp; <code>newPersonType: 'base'</code>
  - name: Contract management - commission profiles
    description: >-
      <b>Fee profile</b> - defines transaction type for applying fees and if operation with this transaction type is allowed or not.  <br>Fee profile should be created in the contract for each existing transaction type.  <br>If fee profile is not created it means that operation with this transaction type is not allowed.  <br>Enabling and disabling operations can be also performed by setting the parameter `active` for the fee profile to true or false respectively.
  - name: Contract management - commission rule conditions
    description: >-
      <b>Fee rule condition</b> is linked to the <code>Fee rule</code> and defines the following settings: <ul> <li>the range of the transaction amounts to apply certain fees</li> <li>the type of fee (<code>zero</code>, <code>percent</code>, <code>fixed</code>, <code>greater of fixed or percent</code>, <code>lesser of fixed or percent</code>, <code>fixed and percent</code>)</li> <li>the value of the fee depending on the fee type</li> </ul>
  - name: Contract management - commission rules
    description: >-
      <b>Fee rule</b> is linked to the <code>fee profile</code> and defines the following settings: <ul> <li>the period (date range) when fee is applied</li> <li>the direction of the fee (<code>IN</code>, <code>OUT</code>, <code>SHARED</code> — available depending on operation type)</li> <li>whether the fee is active or not — at least one and only one active fee rule for each clause should always exist, otherwise the system returns an error during operation processing</li> </ul>
  - name: Contract management - limit rules
    description: >-
      <b>Limit rule</b> is linked to the fee profile and defines limits for the specified in the fee profile transaction type.
  - name: Country information
    description: Country Controller
  - name: Currency exchange
    description: >-
      Currency exchange operation allows users to perform transfers between accounts in different currencies using system exchange rates.  <br>Currency exchange is performed using transit accounts in source and destination currencies to align accounting with  available balance for exchange and track currency exchange differences. Such accounts are called <b>Exchange reserve</b>. <br>To be able to perform a currency exchange operation: <ul> <li>there should be enough money on the exchange reserve account in the destination currency</li> <li>exchange rate for the currency pair should be created and have status <code>active</code></li> </ul> <br>The following statuses of exchange rate are available: <ul> <li><code>created</code> — when the exchange rate is created. Exchange operation is not allowed.</li> <li><code>active</code> — when the exchange rate is activated. It should be done after creation to allow exchange operation.</li> <li><code>disabled</code> — when the exchange rate is disabled. Exchange operation is not allowed.</li> <li><code>unavailable</code> — when the exchange rate is unavailable (used when integration is configured to fetch rates from external source). Exchange operation is not allowed.</li> </ul> <br>SDK.finance platform has technical integration with [Currency Cloud](<https://www.currencycloud.com/>) to get exchange rates.  <br>To be able to use this integration, contact us on [our contact form](<https://sdk.finance/#form>).
  - name: Currency exchange rates provider management
    description: >-
      Currency exchange rate provider management allows users to manage exchange rate providers used to retrieve currency exchange rates.  <br>Currency exchange rate can be set manually or obtained from the provider. <br>SDK.finance platform has technical integration with [Currency Cloud](<https://www.currencycloud.com/>) to get exchange rates.  <br>To be able to use this integration contact us on [our contact form](<https://sdk.finance/#form>).
  - name: Currency management
    description: >-
      The SDK.finance platform supports multi-currency.  <br><b>Currency</b> (it can also be named as <b>Asset</b> in code) in the SDK.finance platform can be a digital currency, fiat currency, cryptocurrency,  or any entity you are going to account in the platform, like points, bonuses, etc. <br><br>Currency in the SDK.finance platform has the following parameters: <ul> <li><code>id</code> - Unique UUID, generated by the system for each currency</li> <li><code>currencyCode</code> - Currency code, can be any code specified by user or ISO currency code for fiat currency</li> <li><code>digitalCode</code> - Currency digital code, can be any code specified by user or ISO digital code for fiat currency</li> <li><code>name</code> - Currency name</li> <li><code>symbol</code> - Currency symbol for representation where required</li> <li><code>fraction</code> - Currency fraction (how many fractional units are in one basic unit), e.g. USD fraction is 100 — 1 dollar = 100 cents</li> <li><code>scale</code> - Number of decimal places to show when displaying balance</li> <li><code>active</code> - Whether currency is active. If <code>false</code>, all operations and account creation in this currency are forbidden</li> <li><code>snPrefix</code> - Optional prefix used for account number generation (currently not used)</li> <li><code>isMain</code> - Whether currency is the main one. Only one main currency should exist. Exchange rates are defined relative to this currency</li> <li><code>availableForExchange</code> - Whether the currency is available for exchange</li> <li><code>type</code> - Currency type</li> </ul> <br>There are the following currency types: <ul> <li><code>FIAT</code> - Traditional currencies like USD, EUR, etc.</li> <li><code>CRYPTO</code> - Cryptocurrencies like Bitcoin, Ethereum, etc.</li> <li><code>BONUS</code> - Bonus points or other loyalty rewards</li> <li><code>VIRTUAL</code> - System-specific virtual currencies (e.g., game points)</li> </ul>
  - name: Customer support
    description: >-
      This API set allows managing chats between business and service users. In the code, a chat is referred to as a conversation.
  - name: Customer verification settings management
    description: >-
      This API set allows managing settings related to the process of customer verification (KYC).
  - name: Documents management
    description: Provides endpoints for generating documents in different output formats (e.g., PDF, HTML, etc.).
  - name: Dispute operations
    description: >-
      This API set allows service users to initiate Refund for the processed external operations.
  - name: Environment variable tech management. For developers only
    description: Environment Variables Controller
  - name: Export transactions
    description: Export Transactions Controller
  - name: External Process Management
    description: >-
      SDK.finance platform provides ability to group operations in the system by external process ID.  <br>It enables the tracking of external processes that contain several subsequent operations, from initiation to completion across different systems. <br>External process ID is a unique ID assigned by an external system to a transaction.  <br>This ID should be provided in the API for operation creation and can be used for transfer, top-up via bank, and withdrawal via bank.
  - name: External operations - card issuing
    description: >-
      These APIs describe the issuing of a payment card via an integrated third-party provider. <br>To be able to issue a payment card and link it to the user's account: <ul> <li>A third-party card issuing provider must be integrated with the platform.</li> <li>A product for card issuing must be created. See the description of the API <code>POST /issue-card/card-products</code>.</li> <li>A fee for card issuing must be configured in Contracts. See <b>Contract management - fee rules</b> for more details.</li> </ul> <br>SDK.finance platform has technical integration with [Marqeta](<https://www.marqeta.com/>) to provide card issuing. <br>To use this integration for card issuing and card management contact us on [our contact form](<https://sdk.finance/#form>). <br>You can also watch demo video about how card issuing works on [card issuing demo](<https://sdk.finance/card-issuing/>).
  - name: External operations - issued cards management by business user
    description: >-
      This set of APIs allows business users to view and manage issued via third-party provider payment cards.  <br>Integration with third-party card issuing provider is required to use these APIs.  <br>The issued card is linked to the user using `token`.  <br>All card information except `token` is stored in the third-party provider system. <br>If card is not tokenized this set of API also provides ability to tokenize card and store it securely in the system. <br>SDK.finance platform has technical integration with [Corefy](<https://corefy.com/>) to provide card tokenization. <br>To be able to use this integration for card tokenization contact us on [our contact form](<https://sdk.finance/#form>).
  - name: External operations - issued cards management by service user
    description: >-
      This set of APIs allows service users to view Card products used for card issuing and users stored in the third-party card issuing provider system.  <br>The card product is created in both the SDK.finance platform and third-party provider system and usually represents the schema in which the payment card is issued, pricing plan and card usage conditions for the customer.  <br>Card product configuration and parameters depend on the integration with the third-party provider. <br>Users in the SDK.finance platform and third-party provider system are linked through the `token` parameter which is stored behind the user.
  - name: External operations - product management
    description: >-
      These APIs are used to manage Provider products.  <br><b>Provider products</b> are products which user can by from third-party provider integrated with the platform.  <br>To buy Provider products, operation <b>Purchase via provider</b> (transaction `type`=`PURCHASE`) should be used. <br>More about Provider operations you can read in the <b>External operations - top-up, withdrawal</b> and <b>External operations - purchase</b>. <br>To be able to perform operation <b>Purchase via provider</b>, Provider products should be added to the platform. <br><b>External operations - product management</b> allows user with appropriate permission to manage in the the system products and services offered by a certain provider.  <br>These services or products will be available for purchase by the <b>Customer</b> (<b>Individual</b> or <b>Merchant</b> business user).  <br>In order to buy a certain product (to use services offered by the Provider) you need to call API `POST /gate/transaction` <br>and specify product in the operation `type`:`PURCHASE`.   <br>In order to add a certain Provider product to the system, the Provider must be configured at the system boot.
  - name: External operations - provider management
    description: >-
      <b>External operations</b> (also can be called <b>provider operations</b>) are operations via third-party service providers integrated with the platform. <br>SDK.finance platform is designed to have a separate accounting for each integrated third-party provider and handle the fee flows. <br>The following external operations are supported on the platform: <ul> <li><code>TOPUP</code> - top-up of client account via third-party provider</li> <li><code>PURCHASE</code> - purchase of goods or services via third-party provider using client account</li> <li><code>REDEEM</code> - withdrawal from client account via third-party provider</li> <li><code>ISSUE_CARD</code> - issue payment card linked to the client account via third-party provider</li> </ul> <br>Definitions, you can see in this documentation related to the external operations: <ul> <li><b>Third-party provider, Provider</b> - an external organization that provides services</li> <li><b>Gate</b> - the technical implementation of the Provider, meaning an integration is required, or a custom gate exists in the system for Providers without integration</li> </ul> <br>To be able to perform external operations in the system: <ul> <li>Integration with the required third-party provider should be implemented or a custom gate should be added.  After adding a third-party provider to the system, it should be linked to the gate with integration or to the custom gate if integration is not required. One Provider can be linked to one gate, but one gate can be linked to many Providers. A third-party provider without integration may be created to track external operations, reflect them in the user's balance, and calculate fees.</li> <li>The required operations should be added to the Contracts (see <b>Contract management - fee profiles</b>)</li> </ul> <br>Provider transaction (as a part of <code>GateProcess</code> business process) has a status (<code>txStatus</code> or <code>status</code>), which reflects the transaction state in the overall <code>BusinessProcess</code> flow. <br>Provider transaction has the following statuses: <br><b>INITIATED</b> - when the transaction was started by the user, but the payment provider wasn't yet chosen <ul> <li><b>State:</b> <code>In progress</code></li> <li><b>Transition:</b> <code>Success</code>, <code>Failed</code></li> </ul> <br><b>PROVIDER_ASSIGNED</b> - when the user has already chosen the provider <ul> <li><b>State:</b> <code>In progress</code></li> <li><b>Transition:</b> <code>Success</code>, <code>Failed</code></li> </ul> <br><b>PENDING</b> - when the transaction was sent to the payment provider (e.g. user was redirected to the provider website) or a new transaction request was received from the provider (e.g. terminals) <ul> <li><b>State:</b> <code>In progress</code></li> <li><b>Transition:</b> <code>Success</code>, <code>Failed</code></li> </ul> <br><b>PROVIDER_PROCESSED</b> - when the payment provider completed the transaction successfully <ul> <li><b>State:</b> <code>In progress</code></li> <li><b>Transition:</b> <code>Success</code>, <code>Failed</code></li> </ul> <br><b>PROCESSED</b> - transaction was completed successfully <ul> <li><b>State:</b> <code>Success</code></li> <li><b>Transition:</b> <code>Terminated</code></li> </ul> <br><b>FAILURE</b> - transaction was completed unsuccessfully (error response received from the provider) <ul> <li><b>State:</b> <code>Failed</code></li> <li><b>Transition:</b> <code>Terminated</code></li> </ul> <br><b>EXCEPTION</b> - an exception occurred after payment provider selection <ul> <li><b>State:</b> <code>Failed</code></li> <li><b>Transition:</b> <code>Terminated</code></li> </ul>
  - name: External operations - purchase
    description: >-
      This section describes how to perform the purchase external operation: <ul> <li><b>Purchase via provider</b> (<code>PURCHASE</code>) - purchase of goods or services via third-party provider using client account</li> </ul> <br><br>To get more details about external operations check other sections related to the <b>External operations</b>.
  - name: External operations - top-up, withdrawal
    description: >-
      This section describes how to perform the following external operations: <ul> <li><b>Top-up via provider</b> (<code>TOPUP</code>) - top-up of client account via third-party provider</li> <li><b>Withdrawal via provider</b> (<code>REDEEM</code>) - withdrawal from client account via third-party provider</li> </ul> <br><br>To get more details about external operations check other sections related to the <b>External operations</b>.
  - name: Global notification settings management
    description: >-
      This API set allows to manage global notification settings
  - name: IBAN management
    description: >-
      User is able to validate the specified IBAN or generate IBAN. <br>IBAN can be used to create bank account in the system and it will be linked to this bank account.  <br>We use in-system library to validate and generate IBAN. To use a specific Bank for this purpose it should be integrated.  <br>More about bank accounts is described in the <b>Bank accounts management by business roles</b>.
  - name: I18n management
    description: >-
      This API set allows managing internationalization (I18n) settings in the system, enabling the definition of localized entity names,  interface labels, messages, and other parameters in different languages (locales).
  - name: In-system cards management by owner
    description: >-
      In-system card can be linked to the account and allows performing in-system transfers using the in-system card number instead of the account number. <br>Several in-system cards can be linked to one account. <br>In-system card has the following parameters: <ul> <li>In-system card name - specified during creation</li> <li>In-system card number - 16-digit unique number generated by the system</li> <li>In-system card expiration date - generated by the system using variable <code>in_system_cards_expiration_period_in_months</code>.  This variable can be changed using API <code>PUT /environment-variables</code>.</li> <li>Expiration status - shows if the in-system card is expired</li> <li>Active parameter - shows if the card is active or not</li> </ul> <br>This API set allows users with business roles to manage their in-system cards.
  - name: In-system cards management by service role
    description: >-
      This API set allows users with service roles to manage in-system cards. To read more about in-system cards check <b>In-system cards management by owner</b>
  - name: Investigation
    description: >-
      This API set allows service users to initiate investigation for the specified operation, view investigations and manage investigation status.
  - name: Invoice
    description: >-
      <b>Invoice</b> allows the <b>Merchants</b> business user to receive payments for goods/services from <b>Individuals</b> or other <b>Merchants</b>.   <br>An invoice is a document that contains the list of goods or services that the merchant has provided to the customer, along with the price and any applicable taxes.  <br>System allows <b>Merchants</b> to easily create, send, and manage invoices electronically (generate and track invoices, automate payment reminders, and manage customer payments). <br>Along with <b>Invoice</b>, there is another functionality to pay for goods/services to a particular Merchant which is called <b>Merchant Payment</b>.  <br>The main difference between merchant payment and invoice is that merchant payment, when created, contains information about the POS and details about the products that were part of the order associated with that payment.   <br>Use cases related to invoicing include:  <ul> <li>Invoice creation</li> <li>View and filter the list of created invoices</li> <li>Invoice templates</li> <li>Payment for invoices</li> </ul>
  - name: Login change
    description: >-
      When users are unable to access the phone number used for login and two-factor authentication with OTP enabled, they must be provided with the ability to change their login phone number. <br>To proceed with this request, users need to specify their old phone number before continuing with the next steps. <br>To change their login phone number, users must upload the required documents to verify their identity. <br>To complete the request to change their login phone number, users must specify and confirm the new phone number.
  - name: Login credentials management
    description: >-
      These APIs are used to manage user's credentials login on the system.
  - name: Media files management
    description: >-
      These APIs are used to manage media files on the system. For example, the business users (<b>Individual</b>, <b>Merchant</b>) upload documents for identification and further review the documents by the <b>Administrator</b> or <b>Compliance Manager</b> during the KYC procedure.
  - name: Merchant Payment
    description: >-
      <b>Invoice</b> allows the <b>Merchants</b> business user to receive payments for goods/services from <b>Individuals</b> or other <b>Merchants</b>.   <br>An invoice is a document that contains the list of goods or services that the merchant has provided to the customer, along with the price and any applicable taxes.  <br>System allows <b>Merchants</b> to easily create, send, and manage invoices electronically (generate and track invoices, automate payment reminders, and manage customer payments). <br>Along with <b>Invoice</b>, there is another functionality to pay for goods/services to a particular Merchant which is called <b>Merchant Payment</b>.  <br>The main difference between merchant payment and invoice is that merchant payment, when created, contains information about the POS and details about the products that were part of the order associated with that payment.   <br>Use cases related to invoicing include: <ul> <li>Invoice creation</li> <li>View and filter the list of created invoices</li> <li>Invoice templates</li> <li>Payment for invoices</li> </ul>
  - name: Merchant product catalog
    description: >-
      Merchant products can be used for merchant payment if you need to manage merchant product catalog in the system and use it for merchant payment.  <br>To use Merchant products in the merchant payment you will need to create Merchant product measure unit and Merchant product price. <br>If it is required you can also group merchant products by Merchant product categories.
  - name: Merchant product categories
    description: >-
      Merchant product categories can be used to group merchant products to have Merchant product catalog more structured.
  - name: Merchant product measure units
    description: >-
      Merchant product measure unit should be created to be able to set Merchant product price.
  - name: Merchant product price
    description: >-
      Merchant product price can be used if you use Merchant product catalog for merchant payment creation.  <br>There is also an ability to specify the price while creating merchant payment and ignore the price set for the Merchant product catalog.
  - name: MongoDB synchronisation
    description: >-
      MongoDB is used for UI representation to separate it from the operational database. Data synchronisation is embedded in the business processes.  <br>This set of APIs allows the synchronisation of data in MongoDB for the list of business processes if required to do it manually.
