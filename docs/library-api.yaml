  '/v1/close/coin/{serial}':
    put:
      tags:
        - Wallet management by owner
      summary: Close account
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to close the account. <br>Pass the account number in <code>serial</code> in the request URL parameter. <br>The account number can be taken from the <code>serial</code> field in the API <code>GET /coins</code>. <br>Pass <code>transferType</code> in the request body to identify how the account should be closed. <br>The rest of the request body parameters depend on the selected <code>transferType</code>. <br>The following account closing options are available: <ul> <li><code>coin_zero_balance</code> - Close the account without balance. The account will be closed immediately.</li> <li><code>coin_transfer</code> - Close the account with balance and transfer the remaining balance to another account of the same user.  The account will be closed immediately.  The destination account should be specified in <code>transferToCoinSerial</code>.  If the destination account has a different currency, the system will perform a currency exchange  according to the system rate and transfer the balance to the destination account in the appropriate currency.</li> <li><code>iban_transfer</code> - Close the account with balance and transfer the remaining balance to an IBAN. IBAN parameters <code>iban</code>, <code>swift</code>, and <code>recipientFullName</code> should be specified in the request body. A request to close the account will be created, and when the request is approved, the account will be closed and the balance will be withdrawn.</li> </ul> </div>
      security:
        - BearerAuth: []
      operationId: closeCoinRequest
      parameters:
        - name: serial
          in: path
          description: "Account number. It is returned in the API response for `POST /coins ` or can be taken from the API `GET /coins`."
          example: "765058479176"
          required: true
          schema:
            $ref: '#/components/schemas/ParameterString'
      requestBody:
        description: Close account request parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseCoinReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinClosingResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
