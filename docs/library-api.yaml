  /v1/reconciliation/operational-days/create-calendar:
    post:
      tags:
        - Reconciliation - Operational days management
      summary: Set up calendar with operational days for the specified period
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to set up calendar with operational days for the specified period. <br>If calendar for the specified period has been set up earlier it should be deleted and then it can be set up again, it cannot be updated.  <br>To delete calendar use API <code>DELETE /reconciliation/operational-days</code>. <br>Pass the following parameters in the request body: <li><b>Period begin date</b> in the <code>dateFrom</code>. Begin date of the period for which calendar will be set up.  <br>Based on this date and time shift, end date of the last existing operational day will be calculated as <code>dateFrom 23:59:59 + timeShift</code>.  <br>If calendar is being created the first time, end date will be calculated for the zero operational day. <li><b>Period end date</b> in the <code>dateTo</code>. End date of the period for which calendar will be set up.  <br>Based on this date and time shift, begin date of the last operational date in the created period will be calculated as <code>dateTo 00:00:00 + timeShift</code>.  <br>End date of the last operational day in the period will remain empty until calendar for further period will be set up.  <li><b>Time shift</b> in <code>timeShift</code>. Time shift in the format <code>hh:mi:ss</code> if operational date should be started not from the 00:00:00.  <br><br>Lets consider several examples of calendar creation to make it more clear.  <br>After initialization, system has only zero operational day. <div> <table> <thead> <th>Operational day number</th> <th>Begin date</th> <th>End date</th> <th>Status</th> </thead> <tbody> <tr> <td>0</td> <td>1970-01-01</td> <td>-</td> <td>Open</td>     </tr> </tbody> </table> </div> <br>This day will last until you set up the first calendar period.  <br>For example, today is <code>2025-01-20</code> and you set up the following calendar period:  <div>

           <i>
           {<br>
           &ensp;&ensp;&ensp;&ensp;"dateFrom": "2025-01-20",<br>
           &ensp;&ensp;&ensp;&ensp;"dateTo": "2025-01-24",<br>
           &ensp;&ensp;&ensp;&ensp;"timeShift": "00:00:00"<br>
           }
           </i>
        </div> <br>End date for operational day <code>0</code> will be calculated as <code>"2025-01-20 23:59:59" + "00:00:00"</code> and it will be <code>"2025-01-20 23:59:59"</code>. <br>Begin date for operational day <code>1</code> will be calculated as <code>"2025-01-21 00:00:00" + "00:00:00"</code> and it will be <code>"2025-01-21 00:00:00"</code>. <br>End date for operational day <code>1</code> will be calculated as <code>"2025-01-21 23:59:59" + "00:00:00"</code> and it will be <code>"2025-01-21 23:59:59"</code>, etc. <br>End date of the last day in the period will be empty.  <br>As a result, the following calendar will be created: <div> <table> <thead> <th>Operational day number</th> <th>Begin date</th> <th>End date</th> <th>Status</th> </thead> <tbody> <tr> <td>0</td> <td>1970-01-01</td> <td>2025-01-20 23:59:59</td> <td>Open</td>     </tr> <tr> <td>1</td> <td>2025-01-21 00:00:00</td> <td>2025-01-21 23:59:59</td> <td>Future</td>     </tr> <tr> <td>2</td> <td>2025-01-22 00:00:00</td> <td>2025-01-22 23:59:59</td> <td>Future</td>     </tr> <tr> <td>3</td> <td>2025-01-23 00:00:00</td> <td>2025-01-23 23:59:59</td> <td>Future</td>     </tr> <tr> <td>4</td> <td>2025-01-24 00:00:00</td> <td>-</td> <td>Future</td>     </tr> </tbody> </table> </div> <br>Now, let us assume that you need to set up the next period with time shift for 3 hours: <div>

           <i>
           {<br>
           &ensp;&ensp;&ensp;&ensp;"dateFrom": "2025-02-01",<br>
           &ensp;&ensp;&ensp;&ensp;"dateTo": "2025-02-04",<br>
           &ensp;&ensp;&ensp;&ensp;"timeShift": "03:00:00"<br>
           }
           </i>
        </div> <br>Calculation logic with time shift is the same, everything is just shifted. <br>End date for operational day <code>4</code> will be calculated as <code>"2025-02-01 23:59:59" + "03:00:00"</code> and it will be <code>"2025-02-02 02:59:59"</code>. <br>Begin date for operational day <code>5</code> will be calculated as <code>"2025-02-02 00:00:00" + "03:00:00"</code> and it will be <code>"2025-02-02 03:00:00"</code>. <br>End date for operational day <code>5</code> will be calculated as <code>"2025-02-02 23:59:59" + "03:00:00"</code> and it will be <code>"2025-02-03 02:59:59"</code>, etc. <br>End date of the last day in the period will be empty.  <br>As a result, the following calendar will be created: <div> <table> <thead> <th>Operational day number</th> <th>Begin date</th> <th>End date</th> <th>Status</th> </thead> <tbody> <tr> <td>0</td> <td>1970-01-01</td> <td>2025-01-20 23:59:59</td> <td>Open</td>     </tr> <tr> <td>1</td> <td>2025-01-21 00:00:00</td> <td>2025-01-21 23:59:59</td> <td>Future</td>     </tr> <tr> <td>2</td> <td>2025-01-22 00:00:00</td> <td>2025-01-22 23:59:59</td> <td>Future</td>     </tr> <tr> <td>3</td> <td>2025-01-23 00:00:00</td> <td>2025-01-23 23:59:59</td> <td>Future</td>     </tr> <tr> <td>4</td> <td>2025-01-24 00:00:00</td> <td>2025-02-02 02:59:59</td> <td>Future</td>     </tr> <tr> <td>5</td> <td>2025-02-02 03:00:00</td> <td>2025-02-03 02:59:59</td> <td>Future</td>     </tr> <tr> <tr> <td>5</td> <td>2025-02-03 03:00:00</td> <td>2025-02-04 02:59:59</td> <td>Future</td>     </tr> <tr> <td>5</td> <td>2025-02-04 03:00:00</td> <td>-</td> <td>Future</td>     </tr> </tbody> </table> </div> <br>As you can see from the example:  <li>One operational day can last longer than calendar day <li>Length of one calendar day is not always divisible by 24, it can be more or less if time shift is changed.  <br>In the response, you will receive list of created operational days.
      operationId: createOperationalDaysCalendar
      security:
        - BearerAuth: []
      requestBody:
        description: Request to set up calendar with operational days for the specified period
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperationalCalendarReq'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewOperationalCalendarResp'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
  '/v1/reconciliation/operational-days/{dateFrom}':
    delete:
      tags:
        - Reconciliation - Operational days management
      summary: Delete calendar with operational days starting from the specified date
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to delete calendar with operational days starting from the specified date.  <br>Only operational days with <b>Future</b> status can be deleted.  <br>Pass date from which you need to delete calendar in <code>dateFrom</code> in the request body.  <br>As a result, operational days starting from the specified date will be deleted and the end date of the last remaining operational day will be updated to be empty.  <br>Let us assume that today is <code>2025-01-22</code> you have the following calendar you need to delete calendar starting from the <code>2025-01-25</code>. <br><b>Calendar before deletion</b> <div> <table> <thead> <th>Operational day number</th> <th>Begin date</th> <th>End date</th> <th>Status</th> </thead> <tbody> <tr> <td>0</td> <td>1970-01-01</td> <td>2025-01-20 23:59:59</td> <td>Closed</td>     </tr> <tr> <td>1</td> <td>2025-01-21 00:00:00</td> <td>2025-01-21 23:59:59</td> <td>Closed</td>     </tr> <tr> <td>2</td> <td>2025-01-22 00:00:00</td> <td>2025-01-22 23:59:59</td> <td>Open</td>     </tr> <tr> <td>3</td> <td>2025-01-23 00:00:00</td> <td>2025-01-23 23:59:59</td> <td>Future</td>     </tr> <tr> <td>4</td> <td>2025-01-24 00:00:00</td> <td>2025-02-02 02:59:59</td> <td>Future</td>     </tr> <tr> <td>5</td> <td>2025-02-02 03:00:00</td> <td>2025-02-03 02:59:59</td> <td>Future</td>     </tr> <tr> <tr> <td>5</td> <td>2025-02-03 03:00:00</td> <td>2025-02-04 02:59:59</td> <td>Future</td>     </tr> <tr> <td>5</td> <td>2025-02-04 03:00:00</td> <td>-</td> <td>Future</td>     </tr> </tbody> </table> </div> <br>All operational days starting from the <code>2025-01-25</code> will be deleted.  <br>You do not have <code>2025-01-25</code> in the table, so the deletion will be started from the dates you have in the calendar after <code>2025-01-25</code>. <br><b>Calendar after deletion</b> <div> <table> <thead> <th>Operational day number</th> <th>Begin date</th> <th>End date</th> <th>Status</th> </thead> <tbody> <tr> <td>0</td> <td>1970-01-01</td> <td>2025-01-20 23:59:59</td> <td>Closed</td>     </tr> <tr> <td>1</td> <td>2025-01-21 00:00:00</td> <td>2025-01-21 23:59:59</td> <td>Closed</td>     </tr> <tr> <td>2</td> <td>2025-01-22 00:00:00</td> <td>2025-01-22 23:59:59</td> <td>Open</td>     </tr> <tr> <td>3</td> <td>2025-01-23 00:00:00</td> <td>2025-01-23 23:59:59</td> <td>Future</td>     </tr> <tr> <td>4</td> <td>2025-01-24 00:00:00</td> <td>-</td> </tr> </tbody> </table> </div>
      operationId: deleteExistingOperationalDays
      parameters:
        - name: dateFrom
          in: path
          required: true
          example: "2025-01-25"
          schema:
            $ref: '#/components/schemas/ParameterDate'
          description: >-
            The beginning of the period from which the calendar will be deleted (including the beginning date)
      responses:
        '204':
          description: Specified operational days were deleted successfully
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorResponse'
      deprecated: false
