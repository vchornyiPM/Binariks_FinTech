  /v1/reconciliation/records/{reconciliationConfigId}:
    post:
      tags:
        - Reconciliation management
      summary: Create reconciliation record for the specified reconciliation configuration
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to create reconciliation record for the specified reconciliation configuration.  <br>Pass configuration ID in <code>reconciliationConfigId</code> in the request URL.  <br>Reconciliation configuration ID can be taken from <code>id</code> in the response of API <code>POST /reconciliation/config/view</code>. <br>Pass reconciliation type, <code>asset</code> for balances reconciliation and <code>transactions</code> for transactions reconciliation,  in the <code>reconciliationType</code> in the request body.  <br>For balances reconciliation, reconciliation records are created automatically according to the specified in the configuration schedule.  <br>This API can be used to create reconciliation record manually. No other parameters is required.  <br>For transactions reconciliation, pass the following parameters in the request body:  <li>List of files IDs to be used for reconciliation in <code>reconciliationFilesIds</code>. File ID can be taken from <code>id</code> in the response of API  <code>POST /reconciliation/files/view</code>.  <li>Begin date of the required reconciliation period in <code>periodStartAt</code>. <li>End date of the required reconciliation period in <code>periodEndAt</code>. <br>In the response, you will receive reconciliation record ID with all details. <br><br>Notification email about the end of reconciliation period for balances reconciliation is sent to the administrator email specified in the user profile.   <br>Timer to send this notification is set for daily run at 06:00 AM. <br>This setting can be changed using the following environment variable:  <br><code> <br>reconciliation:

          <br>&ensp;&ensp;notification-timer:
            <br>&ensp;&ensp;&ensp;&ensp;enabled: true
            <br>&ensp;&ensp;&ensp;&ensp;schedule-expression: '0 0 6 ? * *' # cron expression
        </code>
      operationId: initiateReconciliationRecord
      parameters:
        - name: reconciliationConfigId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Reconciliation configuration ID. It can be taken from <code>id</code> in the response of API <code>POST /reconciliation/config/view</code>.
          example: "9c9977bf-e110-4ca3-afec-e275a3b004a5"
      requestBody:
