  '/v1/contracts/{contractId}/organization':
    patch:
      tags:
        - Profile management by service role
      summary: Change contract for the specified user
      security:
        - BearerAuth: []
      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to change the contract for the specified user or for the user calling the API. Only an active contract can be assigned to a user. <br>The contract is linked to the organization of the user. <br>Pass the required <code>organizationIds</code> in the request body and the new <code>contractId</code> in the request path. <br>If the API is called by a service user, the contract will be changed for the specified organization. <br>If the API is called by a business user, the organization of the user calling the API must be provided. <br>If the provided organization is different from the organization of the user calling the API, the error <code>exception.organization.not_found</code> is returned. <br>The organization ID can be taken from the <code>id</code> field in the response of API <code>GET /organizations</code>. <br>The contract ID can be taken from the <code>id</code> field in the response of API <code>POST /contracts/view</code>. <br>The contract can only be changed to one with the same person type as the user. <br>You can also specify the date when the new contract should start applying by using the optional parameters <code>applyMethod</code> and <code>applyAt</code>: <ul> <li>Pass <code>applyMethod</code> as <code>SCHEDULED</code>.</li> <li>Pass the required start date in <code>applyAt</code>. If <code>applyAt</code> is not provided, the contract will be applied immediately.</li> <li>For immediate application, either omit the <code>applyMethod</code> and <code>applyAt</code> parameters or pass <code>applyMethod</code> as <code>IMMEDIATE</code>.</li> </ul> <br>If the new contract has a different person type, the person type will also be updated accordingly. <br>The list of person types available for the contract can be obtained from the <code>personTypes</code> field in the API response <code>POST /contracts/view</code>. </div>
      operationId: updateContractForExistingUsers
      parameters:
        - name: contractId
          in: path
          description: Internal ID of the new contract to link to the organization
          required: true
          schema:
            $ref: '#/components/schemas/ParameterString'
      requestBody:
        description: Request to link new contract to the specified organization
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationsContract'
        required: true
      responses:
