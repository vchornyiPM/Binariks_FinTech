          type: string
          description: ID of bank account
        details:
          $ref: '#/components/schemas/BankAccountDetailsDto'
        type:
          $ref: '#/components/schemas/BankAccountType'
        status:
          type: string
          description: Status of bank account
          enum:
            - pending
            - rejected
            - approved
