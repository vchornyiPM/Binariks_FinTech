      description: >-
        <div style="font-family: inherit; font-size: inherit;"> <br>Use this API to get the list of bank accounts by service roles. API supports filtering pagination. <br>In the response, you will receive the list of bank accounts with bank account <code>id</code> and account details. Pass <code>id</code> to the APIs where bank account ID is required.
      operationId: viewBankAccounts
      x-spring-paginated: true
      parameters:
        - $ref: '#/components/parameters/PageParameter'
        - $ref: '#/components/parameters/SizeParameter'
        - name: sort
          in: query
          description: >-
            Sort criteria in the format: `field,(asc|desc)`. Default is ascending. This parameter can be repeated for multiple sort criteria.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SortCriteria'
          style: form
          explode: true
          examples:
            example1:
              value: "bankName,ASC"
              summary: Sort by bankName ascending
            example2:
              value: "status,DESC"
              summary: Sort by status descending
        - name: bankAccountNumber
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Bank account number
          example: "1987426351"
        - name: bankName
          in: query
          required: false
          description: Bank name
          example: "Slovenska Sporitelna"
          schema:
            $ref: '#/components/schemas/ParameterString'
        - name: bic
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Bank Identifier Code (BIC)
          example: "GIBASKBX"
        - name: iban
          in: query
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: IBAN
          example: "SK6807200002891987426351"
        - name: types
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/BankAccountType'
            example: [PERSONAL, POOL]
          style: form
          explode: false
          description: Bank account type
        - name: statuses
          in: query
          required: false
          description: Bank account status
          schema:
            type: array
            items:
              $ref: '#/components/schemas/BankAccountStatus'
          style: form
          explode: false
        - name: swift
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Bank SWIFT code
          example: "GIBASKBX"
        - name: coinSerial
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Account number
          example: "710664919642"
        - name: isDefault
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParameterBool'
          description: Shows that the bank account will be used as default in operations with linked account.
