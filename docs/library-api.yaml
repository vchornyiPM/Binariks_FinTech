  - name: OTP confirmation - confirmation management
    description: >-
      <br>OTP confirmation functionality can be used to introduce an additional verification step for user identity. <br>To start using this functionality, it must be enabled both at the system and user levels. <br>Review <b>OTP Confirmation - System Level Settings</b> and <b>OTP Confirmation - User Level Settings</b> for more details. <br>For demo purposes, OTP is configured as a static value <code>1111</code>. It can be changed in the application configuration, along with OTP length, validity, resend delay, and maximum entry attempts. <br>This API set allows users to get a list of OTP confirmations, resend OTP for confirmation, and confirm an operation or security-sensitive action using OTP. <br>When an operation requires OTP confirmation, the status of the operation returned in the response is <code>waiting_for_approval</code>. <br>Flow to confirm an operation by OTP: <ul> <li>Call API <code>GET /confirmations</code> and pass the following parameters in the request URL: <code>type</code> — according to the operation to confirm, and <code>entityId</code> — the <code>id</code> of the operation to confirm. </li> <li>Take the <code>id</code> from the response.</li> <li>Call API <code>PATCH /confirmations/{confirmationId}</code>, pass the received <code>id</code> as <code>confirmationId</code> in the request URL, and the OTP in <code>confirmationCode</code> in the request body.</li> </ul> <br>The following operations can be confirmed by OTP: <ul> <li><code>VOUCHER_CREATION</code> - Prepaid creation (<code>POST /prepaid-coin</code>)</li> <li><code>VOUCHER_ACTIVATION</code> - Prepaid withdrawal (<code>POST /prepaid-coins/{serial}/activate</code>)</li> <li><code>MERCHANT_PAYMENT</code> - Pay for merchant payment as customer (<code>POST /merchant-payments/{identifier}/execute</code>)</li> <li><code>TOP_UP_VIA_BANK_REQUEST</code> - Create request to perform account top-up via bank transfer (<code>POST /bank-top-ups/create-request</code>)</li> <li><code>WITHDRAWAL_VIA_BANK_REQUEST</code> - Create request to perform withdrawal via bank (<code>POST /bank-withdrawals/create-request</code>)</li> <li><code>TOP_UP_VIA_PROVIDER</code> - Account top-up via provider (<code>POST /gate/transactions</code>, <code>type</code>: <code>TOPUP</code>)</li> <li><code>WITHDRAWAL_VIA_PROVIDER</code> - Withdrawal from account via provider (<code>POST /gate/transactions</code>, <code>type</code>: <code>REDEEM</code>)</li> <li><code>PURCHASE_VIA_PROVIDER</code> - Purchase from account via provider (<code>POST /gate/purchases</code>)</li> <li><code>INVOICE_PAYMENT</code> - Pay for merchant invoice (<code>POST /invoices/{identifier}/pay</code>)</li> <li><code>CARD_ISSUANCE_VIA_PROVIDER</code> - Issue payment card via provider (<code>POST /issue-card/cards</code>)</li> <li><code>TRANSFER</code> - Perform in-system transfer (<code>POST /transfers</code>)</li> <li><code>CLOSE_ACCOUNT</code> - Close account (<code>PUT /v1/close/coin/{serial}</code>)</li> <li><code>DEACTIVATE_ACCOUNT</code> - Deactivate account (<code>PATCH /coins/{serial}</code>, parameter <code>active</code>: <code>false</code>)</li> <li><code>ACTIVATE_ACCOUNT</code> - Activate account (<code>PATCH /coins/{serial}</code>, parameter <code>active</code>: <code>true</code>)</li> <li><code>DELETE_IN_SYSTEM_CARD</code> - Delete in-system card (<code>DELETE /my/in-system-cards/number/{number}</code>)</li> <li><code>CHANGE_CARD_STATUS_IN_SYSTEM_CARD</code> - Change status for in-system card (<code>PATCH /my/in-system-cards/number/{number}</code>, parameter <code>active</code>)</li> </ul>
  - name: OTP confirmation - system level settings
    description: >-
      <br>This API set allows users to view and manage OTP confirmation settings at the system level for a list of operations and security-sensitive actions. <br>If OTP confirmation is disabled at the system level, it will be disabled for all users, regardless of the settings specified at the user level. <br>If OTP confirmation is enabled at the system level, user level settings will be applied. OTP confirmation will be required  if it is enabled for the user and will not be required if it is disabled for the user.
  - name: OTP confirmation - user level settings
    description: >-
      <br>This API set allows users to view and manage OTP confirmation settings at the user level. <br>OTP confirmation settings at the user level will only be considered if OTP confirmation is enabled at the system level.
  - name: Password recovery
    description: This API set allows users to reset password. OTP will be sent to the provided email or phone if it is registered in the system.
  - name: Points of Sale management
    description: >-
      Point of Sale (POS) allows merchants to accept payments. One merchant can have many Points of Sale.  <br>To get more details about merchant payments check <b>Merchant Payment</b>. <br>This API set allows merchants to manage their Points of Sale.
  - name: Prepaid
    description: >-
      <b>Prepaids</b> are purchased by business users with a specific denomination and withdrawed for goods or services later on.  <br>User with the business role is able to create a prepaid or withdraw the previously created prepaid.  The recipient of the prepaid can be any person.  In SDK.finance platform prepaids can be created and sent to unregistered users to encourage them to register and use the account services. <br>To withdraw the prepaid, you need its ID number (represented as a <code>serial</code>) and pin code, which are generated when creating the prepaid. <br>The amount of the prepaid is debited from the user's account after the prepaid is created.  When the prepaid is withdrawn, the amount is credited to the user's account (who withdrawn the prepaid). <br><br>Here are some possible use cases for prepaids within an account platform: <ul> <li><b>Gift cards</b>: Users can generate or purchase a prepaid and send it as a gift to another person.  The recipient can then use the prepaid to make a purchase from a specific merchant or category (after registering as a <b>Business User</b>).</li> <li><b>Discounts and promotions</b>: Platforms can offer prepaids as part of their promotions and discounts.</li> <li><b>Bill payments</b>: Users can purchase a prepaid with a specific denomination and use it to pay their bills, such as utilities, phone bills, and internet bills.</li> <li><b>Event tickets</b>: Users can purchase a prepaid and use it to purchase tickets for concerts, movies, and other events.</li> <li><b>Online shopping</b>: Users can purchase a prepaid and use it to make a purchase from the platform's merchant partners.</li> </ul> <br><br>Current implementation of SDK.finance functionality for prepaids covers creation of prepaids, withdrawing of prepaids, viewing the list of created prepaids, and changing the pin for a prepaid.  <br><br>To operate with prepaids, System interacts with two types of client accounts: <ul> <li><b>client</b>. Account level <code>client</code> <br>A general type of accounts owned by business users. Used as <code>srcSerial</code> or <code>destSerial</code> while the prepaid creation and withdrawal.</li> <li><b>prepaid</b>. Account level <code>client</code> <br>The prepaid account, which contains the amount of the prepaid funds after creating. Amount of the prepaid can be withdrawn by <code>serial</code> of this account and prepaid <code>pin</code>.</li> </ul>
  - name: Profile - Master PIN
    description: >-
      Master Pin is used for Transaction confirmation if it is enabled in the user profile settings.  <br>To get more details about transaction confirmation settings check <b>OTP confirmation</b>. <br>To get more details about transaction confirmation check <b>Transactions management</b>. <br>This API set allows users to manage Master PIN.
  - name: Profile - customer identification (KYC)
    description: >-
      This set of APIs allows to manage customer identification (KYC) process.  <br>The KYC process can be performed by the system user with appropriate permissions.  <br>The SDK.finance platform provides essential KYC functionality such as uploading and verifying user documents and data, and change their status accordingly.   <br>Platform has technical integration with several KYC third-party providers in addition to internal KYC flow.  <br>Check our available integrations [here](<https://sdk.finance/integrations/>).  <br>To start using integration with KYC provider, [contact us](https://sdk.finance/integrations/#form). <br>The following user identification statuses are supported: <ul> <li><code>none</code> - means that user has been registered in the system and did not yet provide required documents for verification.  This status allows user to upload documents. After user uploads at least one document status is changed to <code>pending</code>. Status transition to: <code>pending</code>.</li> <li><code>pending</code> - means that user has uploaded the required documents which were not yet reviewed by compliance or user request to reset identification was approved.  This status allows user to upload documents. Status transition to: <code>review_required</code>, <code>approved</code>, <code>declined</code>.</li> <li><code>review_required</code> - means that verification in the integrated third-party KYC provider were performed and additional compliance review is required.  This status can appear only if integration with third-party KYC provider is enabled. Status transition to: <code>approved</code>, <code>declined</code>.</li> <li><code>approved</code> - means that all uploaded documents and user profile have been approved. Status transition to: <code>pending</code>.</li> <li><code>declined</code> - means that user profile was declined by compliance. This status is final and has no transition.</li> </ul> <br>After user uploads at least one document status is changed to <code>pending</code>. Status transition to: <code>pending</code>. <br>User identification can be approved only when all mandatory documents are uploaded and approved. <br>If it is required to skip the KYC process, for example, if it is done outside the system,  it should be configured on the instance in the <code>application.yaml</code>:  <br><code>compliance:</code> <br>&nbsp; <code>useThirdPartyVerificationService: false</code> <br>If <code>useThirdPartyVerificationService</code> is set as <code>false</code>, the user will be created with the status <code>approved</code>.  <br>The person type for creation will be taken from the <code>newPersonType</code> in the settings: <br><code>compliance:</code> <br>&nbsp; <code>approval:</code> <br>&nbsp; <code>- organizationType: 'individual'</code> <br>&nbsp;&nbsp;&nbsp; <code>newPersonType: 'standard'</code> <br>&nbsp; <code>- organizationType: 'merchant'</code> <br>&nbsp;&nbsp;&nbsp; <code>newPersonType: 'standard'</code>
  - name: Profile - documents management
    description: >-
      As part of the onboarding process customer is able to upload documents.  List of the mandatory documents can be set up in configuration files. <br>After document is uploaded it can be approved, declined, or sent to third-party KYC provider.  <br>The following document statuses are supported: <ul> <li><code>PENDING</code> - document is uploaded.  <br>Document with this status can be re-uploaded.  In this case, previous document will change status to <code>OUTDATED</code>, and new uploaded document will have status <code>PENDING</code>. <br>Status transition to: <code>IN_VERIFICATION</code>, <code>OUTDATED</code>.</li> <li><code>IN_VERIFICATION</code> - user confirmed that uploaded document is correct.  Depending on the configuration, document with this status can be reviewed by compliance, or sent to third-party KYC provider manually or automatically. <br>To start using KYC provider for document verification [contact us](<https://sdk.finance/integrations/#form>). <br>Status transition to: <code>APPROVED</code>, <code>DECLINED</code>, <code>REVIEW_REQUIRED</code>. Document with this status cannot be re-uploaded.</li> <li><code>APPROVED</code> - document is approved. Document with this status cannot be re-uploaded.  To be able to re-upload approved document, user KYC identification should be reset.  <br>Status transition to: <code>OUTDATED</code>.</li> <li><code>DECLINED</code> - means that document is declined. Document with this status cannot be re-uploaded. <br>This is the final status - no status transition.</li> <li><code>OUTDATED</code> - means that customer KYC identification was reset and status of all documents is changed to <code>OUTDATED</code> automatically. Also, when customer re-uploads document in <code>PENDING</code> status, previous document status is changed to <code>OUTDATED</code>. Document with this status can be re-uploaded.  <br>Status transition to: <code>PENDING</code>.</li> </ul> <br>Customer KYC identification can be approved only when all mandatory documents are uploaded and approved. <br>When customer KYC identification is reset, all documents statuses are changed to <code>OUTDATED</code> and should be re-uploaded. <br>For more details about customer identification, check <b>Profile - customer identification (KYC)</b>.
