  '/v1/commission-profile/{profileId}/rule':
    post:
      tags:
        - Contract management - commission rules
      summary: Create new fee rule in the specified fee profile
      security:
        - BearerAuth: []
      description: >-
        Use this API to create new fee rule in the specified fee profile. <br>The type of operation to which the fee rule is applied is specified in the fee profile in which fee rule is created.  <br>Pass the required fee profile ID in the `profileId` in the request URL parameter. <br>Fee profile ID can be taken from `id` in the response of API `POST /commission-profile/view`. <br>Provide `beginDate` and `endDate` in the request body parameters to specify the period when the fee will be applied. <br>If provided period intersects with already existed active fee rule, the system will return error and fee rule will not be created. <br>Provide direction in the request body parameters (`IN`, `OUT`, `SHARED` are available depending on operation type): <li>`IN` means that the fee amount will be deducted from the operation amount. <li>`OUT` means that the fee amount will be added to the operation amount. <li>`SHARED` means that the fee amount will be shared between operation participants. <br>Provide `active` = `true` in the request body parameters to activate the rule after creation or `false` if you will activate it later. <br>If fee rule is inactive, it means that the fee specified in this rule will not be applied even if period is valid. <br>To perform the operation, at least one and only one active fee rule should exist for each clause, otherwise system returns error while operation processing. <br>In response, you will receive fee rule ID along with all rule details.
      operationId: createCommissionRule
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ParameterString'
          description: Fee profile ID. It can be taken from `id` in the response of API `POST /commission-profile/view`.
          example: "9c9977bf-e110-4ca3-afec-e275a3b004a5"
      requestBody:
        description: Request to create new fee rule
